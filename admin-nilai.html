    <script>
      // ==================== PERBAIKAN PAGINATION UNTUK SEMUA KELAS ====================
      (function() {
        // Ambil elemen filter
        const kelasSelect = document.getElementById('filterKelas');
        const semesterSelect = document.getElementById('filterSemester');
        const mapelSelect = document.getElementById('filterMapel');
        
        if (!mapelSelect) return;
        
        // Data untuk pagination
        let currentData = [];      // data mentah yang sudah difilter
        let currentPage = 1;
        const rowsPerPage = 10;
        let currentMode = 'ringkasan'; // 'ringkasan' atau 'detail'
        let currentMapel = 'Semua';
        
        // Helper escape HTML
        const escapeHtml = (str) => {
          if (!str) return '';
          return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        };
        
        // Fungsi render pagination
        function renderPagination() {
          const container = document.getElementById('paginationControls');
          if (!container) return;
          
          const totalPages = Math.ceil(currentData.length / rowsPerPage);
          if (totalPages <= 1) {
            container.innerHTML = '';
            return;
          }
          
          let startPage = Math.max(1, currentPage - 2);
          let endPage = Math.min(totalPages, startPage + 4);
          if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);
          
          let html = '';
          if (currentPage > 1) {
            html += `<button onclick="window.paginationGoTo(${currentPage - 1})" class="px-3 py-2 rounded-xl border border-[var(--border)] text-[10px] font-black hover:bg-blue-500 hover:text-white transition-all"><i class="fas fa-chevron-left"></i></button>`;
          }
          for (let i = startPage; i <= endPage; i++) {
            const activeClass = i === currentPage ? 'bg-blue-500 text-white shadow-lg shadow-blue-500/30' : 'bg-white dark:bg-white/5 text-[var(--text-main)]';
            html += `<button onclick="window.paginationGoTo(${i})" class="w-10 h-10 rounded-xl border border-[var(--border)] text-[10px] font-black transition-all ${activeClass}">${i}</button>`;
          }
          if (currentPage < totalPages) {
            html += `<button onclick="window.paginationGoTo(${currentPage + 1})" class="px-3 py-2 rounded-xl border border-[var(--border)] text-[10px] font-black hover:bg-blue-500 hover:text-white transition-all"><i class="fas fa-chevron-right"></i></button>`;
          }
          container.innerHTML = html;
          
          // Update showing text
          const start = (currentPage - 1) * rowsPerPage;
          const end = Math.min(start + rowsPerPage, currentData.length);
          const showingSpan = document.getElementById('showingText');
          if (showingSpan) {
            showingSpan.innerText = `Menampilkan ${currentData.length > 0 ? start + 1 : 0} - ${end} dari ${currentData.length} Siswa`;
          }
        }
        
        // Fungsi render tabel ringkasan
        function renderRingkasanTable() {
          const tbody = document.getElementById('tableBody');
          if (!tbody) return;
          
          const start = (currentPage - 1) * rowsPerPage;
          const end = start + rowsPerPage;
          const pageData = currentData.slice(start, end);
          
          if (pageData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="py-10 text-center opacity-50 font-bold">Data tidak ditemukan</td></tr>';
            return;
          }
          
          let html = '';
          for (const item of pageData) {
            html += `
              <tr class="table-row bg-white dark:bg-white/5 hover:bg-gray-50 dark:hover:bg-white/10 transition-all">
                <td class="py-5 pl-6 font-bold text-sm text-[var(--text-main)]">${escapeHtml(item.nama)}</td>
                <td class="py-5 text-center text-xs font-bold opacity-60">${item.nisn}</td>
                <td class="py-5 text-center text-xs font-bold">${item.kelas}</td>
                <td class="py-5 pr-6 text-center font-black text-sm text-blue-500">${item.rata}</td>
              </tr>
            `;
          }
          tbody.innerHTML = html;
        }
        
        // Fungsi render tabel detail
        function renderDetailTable() {
          const tbody = document.getElementById('tableBody');
          if (!tbody) return;
          
          const start = (currentPage - 1) * rowsPerPage;
          const end = start + rowsPerPage;
          const pageData = currentData.slice(start, end);
          
          if (pageData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="py-10 text-center opacity-50 font-bold">Data tidak ditemukan</td></tr>';
            return;
          }
          
          let html = '';
          for (const item of pageData) {
            const rata = ((item.uh1 + item.uh2 + item.uts) / 3).toFixed(1);
            html += `
              <tr class="table-row bg-white dark:bg-white/5 hover:bg-gray-50 dark:hover:bg-white/10 transition-all">
                <td class="py-5 pl-6 font-bold text-xs">${item.nisn}</td>
                <td class="py-5 text-center font-bold text-sm">${escapeHtml(item.nama)}</td>
                <td class="py-5 text-center font-bold text-xs">${item.kelas}</td>
                <td class="py-5 text-center font-bold text-xs">${item.uh1}</td>
                <td class="py-5 text-center font-bold text-xs">${item.uh2}</td>
                <td class="py-5 text-center font-bold text-xs">${item.uts}</td>
                <td class="py-5 pr-6 text-center font-black text-sm text-blue-500">${rata}</td>
              </tr>
            `;
          }
          tbody.innerHTML = html;
        }
        
        // Load data ringkasan (SEMUA MAPEL)
        async function loadRingkasan() {
          const kelas = kelasSelect ? kelasSelect.value : '';
          const semester = semesterSelect ? semesterSelect.value : 'Ganjil';
          
          if (!semester) {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" class="py-10 text-center">Pilih semester terlebih dahulu</td></tr>';
            currentData = [];
            renderPagination();
            return;
          }
          
          document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" class="py-10 text-center"><i class="fas fa-spinner fa-spin"></i> Memuat...</td></tr>';
          
          try {
            // Ambil data siswa (filter kelas jika ada)
            let siswaQuery = db.collection('students');
            if (kelas) siswaQuery = siswaQuery.where('kelas', '==', kelas);
            const siswaSnap = await siswaQuery.get();
            const siswaMap = new Map();
            siswaSnap.forEach(doc => {
              const s = doc.data();
              if (s.nisn) siswaMap.set(String(s.nisn), { nama: s.nama, kelas: s.kelas });
            });
            
            // Ambil data nilai (filter semester dan kelas)
            let nilaiQuery = db.collection('nilai').where('semester', '==', semester);
            if (kelas) nilaiQuery = nilaiQuery.where('kelas', '==', kelas);
            const nilaiSnap = await nilaiQuery.get();
            
            const nilaiPerNisn = new Map();
            nilaiSnap.forEach(doc => {
              const n = doc.data();
              const nisn = n.nisn;
              if (!nisn) return;
              if (!nilaiPerNisn.has(nisn)) nilaiPerNisn.set(nisn, []);
              nilaiPerNisn.get(nisn).push({ uh1: n.uh1||0, uh2: n.uh2||0, uts: n.uts||0 });
            });
            
            const items = [];
            for (let [nisn, arr] of nilaiPerNisn.entries()) {
              const siswa = siswaMap.get(nisn);
              if (!siswa) continue;
              let total = 0;
              arr.forEach(v => total += (v.uh1 + v.uh2 + v.uts) / 3);
              const rata = (total / arr.length).toFixed(1);
              items.push({ nisn, nama: siswa.nama, kelas: siswa.kelas, rata });
            }
            
            // Sorting by NISN
            items.sort((a,b) => a.nisn.toString().localeCompare(b.nisn.toString(), undefined, { numeric: true }));
            
            currentData = items;
            currentPage = 1;
            currentMode = 'ringkasan';
            renderRingkasanTable();
            renderPagination();
          } catch(e) {
            console.error(e);
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" class="py-10 text-center text-red-500">Error memuat data</td></tr>';
            currentData = [];
            renderPagination();
          }
        }
        
        // Load data detail (per mapel)
        async function loadDetail(mapel) {
          const kelas = kelasSelect ? kelasSelect.value : '';
          const semester = semesterSelect ? semesterSelect.value : 'Ganjil';
          
          if (!semester) {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="py-10 text-center">Pilih semester terlebih dahulu</td></tr>';
            currentData = [];
            renderPagination();
            return;
          }
          
          document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="py-10 text-center"><i class="fas fa-spinner fa-spin"></i> Memuat...</td></tr>';
          
          try {
            let query = db.collection('nilai')
              .where('mapel', '==', mapel)
              .where('semester', '==', semester);
            if (kelas) query = query.where('kelas', '==', kelas);
            
            const nilaiSnap = await query.get();
            if (nilaiSnap.empty) {
              document.getElementById('tableBody').innerHTML = `<tr><td colspan="7" class="py-10 text-center">Tidak ada data untuk mapel ${mapel}</td></tr>`;
              currentData = [];
              renderPagination();
              return;
            }
            
            const nilaiDocs = [];
            nilaiSnap.forEach(doc => nilaiDocs.push(doc.data()));
            
            // Ambil data siswa untuk join
            const siswaIds = nilaiDocs.map(n => n.siswaId).filter(id => id);
            const siswaMap = new Map();
            if (siswaIds.length) {
              for (let i = 0; i < siswaIds.length; i += 10) {
                const batch = siswaIds.slice(i, i+10);
                const siswaSnap = await db.collection('students').where('__name__', 'in', batch).get();
                siswaSnap.forEach(doc => siswaMap.set(doc.id, doc.data()));
              }
            }
            
            const items = [];
            for (const n of nilaiDocs) {
              let nisn = n.nisn || '';
              let nama = n.nama || '';
              let kelasVal = n.kelas || '';
              if (n.siswaId && siswaMap.has(n.siswaId)) {
                const siswa = siswaMap.get(n.siswaId);
                if (!nisn) nisn = siswa.nisn || '';
                if (!nama) nama = siswa.nama || '';
                if (!kelasVal) kelasVal = siswa.kelas || '';
              }
              items.push({
                nisn: nisn || '-',
                nama: nama || '-',
                kelas: kelasVal || '-',
                uh1: n.uh1 || 0,
                uh2: n.uh2 || 0,
                uts: n.uts || 0
              });
            }
            
            // Sorting by NISN
            items.sort((a,b) => a.nisn.toString().localeCompare(b.nisn.toString(), undefined, { numeric: true }));
            
            currentData = items;
            currentPage = 1;
            currentMode = 'detail';
            renderDetailTable();
            renderPagination();
          } catch(e) {
            console.error(e);
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="py-10 text-center text-red-500">Error memuat data</td></tr>';
            currentData = [];
            renderPagination();
          }
        }
        
        // Fungsi utama update tabel berdasarkan pilihan mapel
        function updateTable() {
          const mapel = mapelSelect.value;
          const header = document.getElementById('tableHeader');
          const label = document.getElementById('ringkasanLabel');
          
          if (mapel === 'Semua') {
            label.innerText = 'RINGKASAN NILAI';
            header.innerHTML = `
              <th class="py-3 pl-6 text-left rounded-l-xl text-[10px] font-black uppercase">Nama</th>
              <th class="py-3 text-center text-[10px] font-black uppercase">NISN</th>
              <th class="py-3 text-center text-[10px] font-black uppercase">Kelas</th>
              <th class="py-3 pr-6 text-center rounded-r-xl bg-[#2563eb] text-[10px] font-black uppercase">Rata-rata</th>
            `;
            loadRingkasan();
          } else {
            label.innerHTML = `DETAIL NILAI: <span class="text-blue-600 font-black">${mapel.toUpperCase()}</span>`;
            header.innerHTML = `
              <th class="py-3 pl-6 text-left rounded-l-xl text-[10px] font-black uppercase">NISN</th>
              <th class="py-3 text-center text-[10px] font-black uppercase">Nama</th>
              <th class="py-3 text-center text-[10px] font-black uppercase">Kelas</th>
              <th class="py-3 text-center text-[10px] font-black uppercase">UH1</th>
              <th class="py-3 text-center text-[10px] font-black uppercase">UH2</th>
              <th class="py-3 text-center text-[10px] font-black uppercase">UTS</th>
              <th class="py-3 pr-6 text-center rounded-r-xl bg-[#2563eb] text-[10px] font-black uppercase">Rata-rata</th>
            `;
            loadDetail(mapel);
          }
        }
        
        // Fungsi pagination goTo (global)
        window.paginationGoTo = function(page) {
          currentPage = page;
          if (currentMode === 'ringkasan') {
            renderRingkasanTable();
          } else {
            renderDetailTable();
          }
          renderPagination();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        
        // Fungsi untuk update dropdown mapel dinamis (ambil dari jadwal_guru)
        async function updateMapelDropdown() {
          const kelas = kelasSelect ? kelasSelect.value : '';
          let mapelList = [];
          
          if (kelas && kelas !== '') {
            const normalizedKelas = kelas.replace(/[-\s]/g, '').toUpperCase();
            try {
              const snapshot = await db.collection('jadwal_guru').where('kelaswalas', '==', normalizedKelas).get();
              const mapelSet = new Set();
              snapshot.forEach(doc => {
                const data = doc.data();
                if (data.jadwal && typeof data.jadwal === 'object') {
                  for (let hari in data.jadwal) {
                    if (Array.isArray(data.jadwal[hari])) {
                      data.jadwal[hari].forEach(ev => {
                        if (ev.mapel && !ev.mapel.toLowerCase().includes('wali')) mapelSet.add(ev.mapel);
                      });
                    }
                  }
                }
              });
              mapelList = Array.from(mapelSet).sort();
            } catch(e) {
              console.error('Gagal ambil mapel:', e);
            }
          }
          
          if (mapelList.length === 0) {
            mapelList = ['PAI', 'PPKN', 'BAHASA INDONESIA', 'MATEMATIKA', 'IPAS', 'SBDP', 'PJOK', 'BAHASA INGGRIS', 'BAHASA JAWA / MULOK', 'TIK'];
          }
          
          const currentVal = mapelSelect.value;
          let options = '<option value="Semua">SEMUA MATA PELAJARAN</option>';
          mapelList.forEach(m => {
            const selected = (m === currentVal) ? 'selected' : '';
            options += `<option value="${m}" ${selected}>${m}</option>`;
          });
          mapelSelect.innerHTML = options;
        }
        
        // Pasang event listeners
        if (kelasSelect) {
          kelasSelect.addEventListener('change', async () => {
            await updateMapelDropdown();
            updateTable();
          });
        }
        if (semesterSelect) {
          semesterSelect.addEventListener('change', () => updateTable());
        }
        if (mapelSelect) {
          mapelSelect.removeAttribute('onchange');
          mapelSelect.addEventListener('change', () => updateTable());
        }
        
        // Override fungsi global agar tidak bentrok dengan script lain
        window.loadDataNilai = loadRingkasan;
        window.loadDetailMapel = loadDetail;
        window.updateTableByMapel = updateTable;
        
        // Inisialisasi: update dropdown mapel lalu load data
        (async function init() {
          await updateMapelDropdown();
          updateTable();
        })();
      })();
      
      // ==================== FUNGSI LAIN (TETAP) ====================
      function searchTable() {
        let input = document.getElementById("searchSiswa");
        let filter = input.value.toLowerCase();
        let tbody = document.getElementById("tableBody");
        let tr = tbody.getElementsByTagName("tr");
        for (let i = 0; i < tr.length; i++) {
          let td = tr[i].getElementsByTagName("td")[0];
          if (td) {
            let txtValue = td.textContent || td.innerText;
            tr[i].style.display = txtValue.toLowerCase().indexOf(filter) > -1 ? "" : "none";
          }
        }
      }
      
      function handleLogout() {
        Swal.fire({
          title: 'Keluar Sistem?',
          text: "Sesi Anda akan diakhiri.",
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#C9494C',
          cancelButtonColor: '#63a4ff',
          confirmButtonText: 'Ya, Keluar'
        }).then((result) => {
          if (result.isConfirmed) window.location.href = 'login.html';
        });
      }
      
      // Profile dropdown
      document.addEventListener("DOMContentLoaded", function() {
        const profileBtn = document.getElementById('profileBtn');
        const profileDropdown = document.getElementById('profileDropdown');
        if (profileBtn && profileDropdown) {
          profileBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            profileDropdown.classList.toggle('hidden');
            profileDropdown.classList.toggle('show-profile');
          });
          document.addEventListener('click', function(e) {
            if (!profileDropdown.contains(e.target) && !profileBtn.contains(e.target)) {
              profileDropdown.classList.add('hidden');
              profileDropdown.classList.remove('show-profile');
            }
          });
        }
      });
    </script>
    <script>
// ==================== OPTIMASI READ FIRESTORE (CACHE + DEBOUNCE) ====================
// Tujuan: mengurangi jumlah read yang tidak perlu, mencegah limit overread
(function() {
    // Cache sederhana: menyimpan data siswa per kelas, dan data nilai per (kelas+semester+mapel)
    const siswaCache = new Map();     // key: "kelas" atau "all" -> data siswa
    const nilaiCache = new Map();     // key: "kelas|semester|mapel" -> data nilai
    
    // Fungsi untuk mengambil data siswa dengan cache
    async function getStudentsWithCache(kelas) {
        const cacheKey = kelas === "" ? "all" : kelas;
        if (siswaCache.has(cacheKey)) {
            console.log("Siswa cache hit:", cacheKey);
            return siswaCache.get(cacheKey);
        }
        console.log("Siswa cache miss, ambil dari Firestore:", cacheKey);
        let query = db.collection("students");
        if (kelas !== "") query = query.where("kelas", "==", kelas);
        const snap = await query.get();
        const siswaMap = new Map();
        snap.forEach(doc => {
            const s = doc.data();
            if (s.nisn) siswaMap.set(String(s.nisn), { nama: s.nama, kelas: s.kelas });
        });
        siswaCache.set(cacheKey, siswaMap);
        return siswaMap;
    }
    
    // Fungsi untuk mengambil data nilai dengan cache (berdasarkan kelas, semester, mapel)
    async function getNilaiWithCache(kelas, semester, mapel) {
        const cacheKey = `${kelas === "" ? "all" : kelas}|${semester}|${mapel === "Semua" ? "all" : mapel}`;
        if (nilaiCache.has(cacheKey)) {
            console.log("Nilai cache hit:", cacheKey);
            return nilaiCache.get(cacheKey);
        }
        console.log("Nilai cache miss, ambil dari Firestore:", cacheKey);
        let query = db.collection("nilai").where("semester", "==", semester);
        if (kelas !== "") query = query.where("kelas", "==", kelas);
        if (mapel !== "Semua") query = query.where("mapel", "==", mapel);
        const snap = await query.get();
        const nilaiDocs = [];
        snap.forEach(doc => nilaiDocs.push(doc.data()));
        nilaiCache.set(cacheKey, nilaiDocs);
        return nilaiDocs;
    }
    
    // Simpan referensi ke fungsi asli yang sudah ada (loadRingkasan dan loadDetail)
    const originalLoadRingkasan = window.loadDataNilai;
    const originalLoadDetail = window.loadDetailMapel;
    
    // Override loadRingkasan dengan versi cache
    if (originalLoadRingkasan) {
        window.loadDataNilai = async function() {
            const kelas = document.getElementById('filterKelas')?.value || '';
            const semester = document.getElementById('filterSemester')?.value || 'Ganjil';
            if (!semester) return;
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="4" class="text-center py-10"><i class="fas fa-spinner fa-spin"></i> Memuat...</td></tr>';
            
            try {
                const [siswaMap, nilaiDocs] = await Promise.all([
                    getStudentsWithCache(kelas),
                    getNilaiWithCache(kelas, semester, "Semua")
                ]);
                
                const nilaiPerNisn = new Map();
                nilaiDocs.forEach(n => {
                    const nisn = n.nisn;
                    if (!nisn) return;
                    if (!nilaiPerNisn.has(nisn)) nilaiPerNisn.set(nisn, []);
                    nilaiPerNisn.get(nisn).push({ uh1: n.uh1||0, uh2: n.uh2||0, uts: n.uts||0 });
                });
                
                const items = [];
                for (let [nisn, arr] of nilaiPerNisn.entries()) {
                    const siswa = siswaMap.get(nisn);
                    if (!siswa) continue;
                    let total = 0;
                    arr.forEach(v => total += (v.uh1 + v.uh2 + v.uts) / 3);
                    const rata = (total / arr.length).toFixed(1);
                    items.push({ nisn, nama: siswa.nama, kelas: siswa.kelas, rata });
                }
                items.sort((a,b) => a.nisn.localeCompare(b.nisn, undefined, { numeric: true }));
                
                window.currentData = items;
                window.currentPage = 1;
                window.currentMode = 'ringkasan';
                if (typeof window.renderRingkasanTable === 'function') window.renderRingkasanTable();
                if (typeof window.renderPagination === 'function') window.renderPagination();
            } catch(e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-10 text-red-500">Error memuat数据</div>';
            }
        };
    }
    
    // Override loadDetail dengan versi cache
    if (originalLoadDetail) {
        window.loadDetailMapel = async function(mapel) {
            if (!mapel || mapel === 'Semua') {
                if (typeof window.loadDataNilai === 'function') window.loadDataNilai();
                return;
            }
            const kelas = document.getElementById('filterKelas')?.value || '';
            const semester = document.getElementById('filterSemester')?.value || 'Ganjil';
            if (!semester) return;
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="7" class="text-center py-10"><i class="fas fa-spinner fa-spin"></i> Memuat...</td></tr>';
            
            try {
                const nilaiDocs = await getNilaiWithCache(kelas, semester, mapel);
                if (nilaiDocs.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="7" class="text-center py-10">Tidak ada数据 untuk mapel ${mapel}</div>`;
                    window.currentData = [];
                    if (typeof window.renderPagination === 'function') window.renderPagination();
                    return;
                }
                
                // Ambil data siswa hanya untuk siswaId yang diperlukan (bisa dari cache juga)
                const siswaIds = nilaiDocs.map(n => n.siswaId).filter(id => id);
                const siswaMap = new Map();
                if (siswaIds.length) {
                    for (let i = 0; i < siswaIds.length; i += 10) {
                        const batch = siswaIds.slice(i, i+10);
                        const siswaSnap = await db.collection('students').where('__name__', 'in', batch).get();
                        siswaSnap.forEach(doc => siswaMap.set(doc.id, doc.data()));
                    }
                }
                
                const items = [];
                for (const n of nilaiDocs) {
                    let nisn = n.nisn || '';
                    let nama = n.nama || '';
                    let kelasVal = n.kelas || '';
                    if (n.siswaId && siswaMap.has(n.siswaId)) {
                        const siswa = siswaMap.get(n.siswaId);
                        if (!nisn) nisn = siswa.nisn || '';
                        if (!nama) nama = siswa.nama || '';
                        if (!kelasVal) kelasVal = siswa.kelas || '';
                    }
                    items.push({
                        nisn: nisn || '-', nama: nama || '-', kelas: kelasVal || '-',
                        uh1: n.uh1||0, uh2: n.uh2||0, uts: n.uts||0
                    });
                }
                items.sort((a,b) => a.nisn.localeCompare(b.nisn, undefined, { numeric: true }));
                
                window.currentData = items;
                window.currentPage = 1;
                window.currentMode = 'detail';
                if (typeof window.renderDetailTable === 'function') window.renderDetailTable();
                if (typeof window.renderPagination === 'function') window.renderPagination();
            } catch(e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-10 text-red-500">Error memuat数据</div>';
            }
        };
    }
    
    // Debounce untuk event listener (mencegah banyak read saat cepat mengganti filter)
    function debounce(fn, delay = 500) {
        let timer;
        return function(...args) {
            clearTimeout(timer);
            timer = setTimeout(() => fn.apply(this, args), delay);
        };
    }
    
    // Pasang ulang event listener dengan debounce (tanpa menghapus yang lama, hanya tambahan)
    const kelasSelect = document.getElementById('filterKelas');
    const semesterSelect = document.getElementById('filterSemester');
    const mapelSelect = document.getElementById('filterMapel');
    
    const debouncedUpdate = debounce(() => {
        if (typeof window.updateTableByMapel === 'function') window.updateTableByMapel();
    }, 400);
    
    if (kelasSelect && !kelasSelect._debouncedAttached) {
        kelasSelect.addEventListener('change', debouncedUpdate);
        kelasSelect._debouncedAttached = true;
    }
    if (semesterSelect && !semesterSelect._debouncedAttached) {
        semesterSelect.addEventListener('change', debouncedUpdate);
        semesterSelect._debouncedAttached = true;
    }
    if (mapelSelect && !mapelSelect._debouncedAttached) {
        mapelSelect.removeEventListener('change', debouncedUpdate);
        mapelSelect.addEventListener('change', debouncedUpdate);
        mapelSelect._debouncedAttached = true;
    }
    
    console.log("Optimasi read Firestore aktif: cache + debounce 400ms");
})();
</script>

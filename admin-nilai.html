  // Tambahkan filter kelas juga di fungsi Detail Mapel
async function loadDetailMapel(mapel) {
    const tableBody = document.getElementById("tableBody");
    const filterKelas = document.getElementById("filterKelas").value;
    tableBody.innerHTML = "";

    let query = db.collection("nilai").where("mapel", "==", mapel);
    
    // Jika ada filter kelas, tambahkan ke query
    if (filterKelas !== "") {
        query = query.where("kelas", "==", filterKelas);
    }

    const nilaiSnap = await query.get();

    nilaiSnap.forEach(doc => {
        const n = doc.data();
        const rata = (((n.uh1 || 0) + (n.uh2 || 0) + (n.uts || 0)) / 3).toFixed(1);

        tableBody.innerHTML += `
            <tr class="table-row bg-white dark:bg-white/5 hover:bg-gray-50 dark:hover:bg-white/10 transition-all">
                <td class="py-5 pl-6 font-bold text-xs">${n.nisn || "-"}</td>
                <td class="py-5 text-center font-bold text-sm">${n.nama || "-"}</td>
                <td class="py-5 text-center font-bold text-xs">${n.kelas || "-"}</td>
                <td class="py-5 text-center font-bold text-xs">${n.uh1 || 0}</td>
                <td class="py-5 text-center font-bold text-xs">${n.uh2 || 0}</td>
                <td class="py-5 text-center font-bold text-xs">${n.uts || 0}</td>
                <td class="py-5 pr-6 text-center font-black text-sm text-blue-500">${rata}</td>
            </tr>
        `;
    });
}
// PASTIKAN fungsi renderRow ini ada di dalam script kamu

<script>
  

let currentPage = 1;
const rowsPerPage = 10;
let filteredData = []; // Untuk menampung data yang sudah difilter

async function loadDataNilai() {
    const tableBody = document.getElementById("tableBody");
    const filterKelas = document.getElementById("filterKelas").value;
    tableBody.innerHTML = `<tr class="text-center"><td colspan="4" class="py-10 opacity-50">Memuat data...</td></tr>`;

    try {
        const studentsSnap = await db.collection("students").get();
        const nilaiSnap = await db.collection("nilai").get();

        let studentsMap = {};
        let nilaiPerSiswa = {};
        let tempArray = [];

        studentsSnap.forEach(doc => {
            const s = doc.data();
            const nisn = String(s.nisn);
            if (filterKelas === "" || s.kelas === filterKelas) {
                studentsMap[nisn] = s;
                nilaiPerSiswa[nisn] = [];
            }
        });

        nilaiSnap.forEach(doc => {
            const n = doc.data();
            const nisn = String(n.nisn);
            if (nilaiPerSiswa[nisn]) nilaiPerSiswa[nisn].push(n);
        });

        // Susun data ke dalam array filteredData
        Object.keys(nilaiPerSiswa).forEach(nisn => {
            const siswa = studentsMap[nisn];
            const listNilai = nilaiPerSiswa[nisn];
            let rata = 0;
            if (listNilai.length > 0) {
                let total = 0;
                listNilai.forEach(n => { total += ((n.uh1 || 0) + (n.uh2 || 0) + (n.uts || 0)) / 3; });
                rata = (total / listNilai.length).toFixed(1);
            }
            tempArray.push({ ...siswa, nisn, rata });
        });

        filteredData = tempArray;
        currentPage = 1; // Reset ke hal 1 setiap filter berubah
        displayTableData();

    } catch (error) {
        console.error("Error:", error);
    }
}

function displayTableData() {
    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";

    // Logika potong array (Pagination)
    let start = (currentPage - 1) * rowsPerPage;
    let end = start + rowsPerPage;
    let paginatedItems = filteredData.slice(start, end);

    if (paginatedItems.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="4" class="py-10 text-center opacity-50 font-bold">Data tidak ditemukan</td></tr>`;
    }

    paginatedItems.forEach(item => {
        tableBody.innerHTML += `
            <tr class="table-row bg-white dark:bg-white/5 hover:bg-gray-50 dark:hover:bg-white/10 transition-all">
                <td class="py-5 pl-6 font-bold text-sm text-[var(--text-main)]">${item.nama}</td>
                <td class="py-5 text-center text-xs font-bold opacity-60">${item.nisn}</td>
                <td class="py-5 text-center text-xs font-bold">${item.kelas}</td>
                <td class="py-5 pr-6 text-center font-black text-sm text-blue-500">${item.rata}</td>
            </tr>`;
    });

    renderPagination();
    updateShowingText(start, end);
}

function renderPagination() {
    const container = document.getElementById("paginationControls");
    container.innerHTML = "";
    const totalPages = Math.ceil(filteredData.length / rowsPerPage);
    
    if (totalPages <= 1) return;

    // Logika "Sliding Window" Maksimal 5 nomor
    let startPage = Math.max(1, currentPage - 2);
    let endPage = Math.min(totalPages, startPage + 4);
    
    if (endPage - startPage < 4) {
        startPage = Math.max(1, endPage - 4);
    }

    // Tombol Prev
    if (currentPage > 1) {
        container.innerHTML += `<button onclick="changePage(${currentPage - 1})" class="px-3 py-2 rounded-xl border border-[var(--border)] text-[10px] font-black hover:bg-blue-500 hover:text-white transition-all"><i class="fas fa-chevron-left"></i></button>`;
    }

    // Tombol Angka
    for (let i = startPage; i <= endPage; i++) {
        const activeClass = i === currentPage ? 'bg-blue-500 text-white shadow-lg shadow-blue-500/30' : 'bg-white dark:bg-white/5 text-[var(--text-main)]';
        container.innerHTML += `
            <button onclick="changePage(${i})" class="w-10 h-10 rounded-xl border border-[var(--border)] text-[10px] font-black transition-all ${activeClass}">
                ${i}
            </button>
        `;
    }

    // Tombol Next
    if (currentPage < totalPages) {
        container.innerHTML += `<button onclick="changePage(${currentPage + 1})" class="px-3 py-2 rounded-xl border border-[var(--border)] text-[10px] font-black hover:bg-blue-500 hover:text-white transition-all"><i class="fas fa-chevron-right"></i></button>`;
    }
}

function changePage(page) {
    currentPage = page;
    displayTableData();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateShowingText(start, end) {
    const total = filteredData.length;
    const actualEnd = end > total ? total : end;
    document.getElementById("showingText").innerText = `Menampilkan ${total > 0 ? start + 1 : 0} - ${actualEnd} dari ${total} Siswa`;
}

document.addEventListener("DOMContentLoaded", loadDataNilai);
</script>



<script>
function searchTable() {
    // 1. Ambil inputan user
    let input = document.getElementById("searchSiswa");
    let filter = input.value.toLowerCase();
    
    // 2. Targetkan ID tableBody yang sudah kita buat tadi
    let tbody = document.getElementById("tableBody");
    let tr = tbody.getElementsByTagName("tr");

    // 3. Looping semua baris tabel
    for (let i = 0; i < tr.length; i++) {
        // Ambil kolom pertama (Nama Siswa)
        let td = tr[i].getElementsByTagName("td")[0]; 
        
        if (td) {
            let txtValue = td.textContent || td.innerText;
            
            // 4. Jika teks cocok, tampilkan. Jika tidak, sembunyikan.
            if (txtValue.toLowerCase().indexOf(filter) > -1) {
                tr[i].style.display = "";
            } else {
                tr[i].style.display = "none";
            }
        }
    } // Kurung penutup loop for
} // Kurung penutup fungsi searchTable (TADI DI SINI KELEBIHAN)
function updateTableByMapel() {
    const mapel = document.getElementById("filterMapel").value;
    const header = document.getElementById("tableHeader");
    const label = document.getElementById("ringkasanLabel");

    if (mapel === "Semua") {
        label.innerText = "RINGKASAN NILAI";

        header.innerHTML = `

<script>
  // Fungsi untuk mengganti tema
  function toggleTheme() {
    const body = document.body;
    const icon = document.getElementById("themeIcon");

    // Menambah/menghapus class .dark-mode yang sudah kamu buat di CSS
    body.classList.toggle("dark-mode");

    // Mengganti icon bulan/matahari
    if (body.classList.contains("dark-mode")) {
      icon.classList.replace("fa-moon", "fa-sun");
      localStorage.setItem("theme", "dark"); // Simpan pilihan
    } else {
      icon.classList.replace("fa-sun", "fa-moon");
      localStorage.setItem("theme", "light"); // Simpan pilihan
    }
  }

  // Penting: Jalankan ini saat halaman pertama kali dibuka
  let defaultHeader; // <-- bikin global

document.addEventListener("DOMContentLoaded", () => {
  // simpan header awal
  defaultHeader = document.getElementById("tableHeader").innerHTML;

  // ambil theme dari localStorage
  const savedTheme = localStorage.getItem("theme");

  if (savedTheme === "dark") {
    document.body.classList.add("dark-mode");
    const icon = document.getElementById("themeIcon");
    if (icon) icon.classList.replace("fa-moon", "fa-sun");
  }
});
</script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const profileBtn = document.getElementById('profileBtn');
    const profileDropdown = document.getElementById('profileDropdown');

    // 1. Toggle dropdown saat tombol diklik
    profileBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        profileDropdown.classList.toggle('hidden');
        profileDropdown.classList.toggle('show-profile');
    });

    // 2. Tutup dropdown jika klik di luar area profil
    document.addEventListener('click', function(e) {
        if (!profileDropdown.contains(e.target) && !profileBtn.contains(e.target)) {
            profileDropdown.classList.add('hidden');
            profileDropdown.classList.remove('show-profile');
        }
    });

    // 3. Efek Hover tambahan untuk tombol
    profileBtn.addEventListener('mouseenter', () => {
        profileBtn.querySelector('.fa-chevron-down').style.transform = 'translateY(2px)';
    });
    profileBtn.addEventListener('mouseleave', () => {
        profileBtn.querySelector('.fa-chevron-down').style.transform = 'translateY(0)';
    });
});

// Fungsi Logout (Jika belum ada)
function handleLogout() {
    Swal.fire({
        title: 'Keluar Sistem?',
        text: "Sesi Anda akan diakhiri.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#C9494C',
        cancelButtonColor: '#63a4ff',
        confirmButtonText: 'Ya, Keluar'
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = 'login.html';
        }
    })
}
</script>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Rapot - Guru Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-[#0f172a] text-white flex-shrink-0 hidden md:flex flex-col">
            <div class="p-6 border-b border-slate-800 flex items-center space-x-3">
                <i class="fas fa-user-shield text-2xl text-blue-400"></i>
                <span class="text-xl font-bold tracking-tight">GURU PANEL</span>
            </div>
            <nav class="flex-1 mt-6 px-4 space-y-2">
                <a href="guru-dashboard.html" class="flex items-center py-3 px-4 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition">
                    <i class="fas fa-database mr-3"></i> Beranda
                </a>
                <a href="guru-presensi.html" class="flex items-center py-3 px-4 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition">
                    <i class="fas fa-user-check mr-3"></i> Presensi Siswa
                </a>
                <a href="guru-nilai.html" class="flex items-center py-3 px-4 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition">
                    <i class="fas fa-file-invoice mr-3"></i> Input Nilai
                </a>
                <a href="guru-ai-rapot.html" class="flex items-center py-3 px-4 bg-[#2563eb] text-white rounded-xl transition shadow-lg shadow-blue-900/20">
                    <i class="fas fa-robot mr-3"></i> AI Rapot
                </a>
            </nav>
            <div class="p-6 border-t border-slate-800">
                <a href="#" class="flex items-center text-red-400 hover:text-red-300 font-bold transition">
                    <i class="fas fa-sign-out-alt mr-3"></i> Logout
                </a>
            </div>
        </aside>

        <div class="flex-1 flex flex-col">
            <header class="bg-white shadow-sm py-4 px-8 flex justify-between items-center">
                <h2 class="text-xl font-bold text-slate-800">AI Rapot Generator</h2>
                <div class="flex items-center space-x-3">
                    <span class="text-[10px] font-bold bg-blue-100 text-blue-700 px-3 py-1 rounded-full uppercase">Guru Pengampu</span>
                    <div class="w-10 h-10 rounded-full bg-[#0091d5] flex items-center justify-center text-white font-bold shadow-inner">ED</div>
                </div>
            </header>

            <main class="p-8">
    <div class="flex flex-wrap gap-4 mb-8">
        <select id="select-kelas" class="bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
            <option>Pilih Kelas</option>
            <option value="1-A">Kelas 1-A</option>
            <option value="1-B">Kelas 1-B</option>
        </select>
        <select id="select-semester" class="bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
            <option>Pilih Semester</option>
            <option value="Ganjil">Ganjil</option>
            <option value="Genap">Genap</option>
        </select>
        <select id="select-mapel" class="bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
            <option>Pilih Mapel</option>
            <option value="Matematika">Matematika</option>
            <option value="Informatika">Informatika</option>
        </select>
        <button id="btn-load-analisis" class="bg-slate-800 text-white px-6 py-2 rounded-xl font-bold hover:bg-slate-700 transition">
            <i class="fas fa-sync-alt mr-2"></i> Muat Data Nilai
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Rerata Kelas</p>
            <h4 id="stat-rerata" class="text-3xl font-black text-slate-800">-</h4>
        </div>
        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Perlu Remedial</p>
            <h4 id="stat-remedial" class="text-3xl font-black text-amber-500">-</h4>
        </div>
        
        <button id="btn-generate-all" class="bg-blue-600 rounded-3xl shadow-lg shadow-blue-200 p-6 flex items-center justify-between text-white hover:bg-blue-700 transition group">
            <div class="text-left"> 
                <p class="text-[10px] font-bold uppercase">AI ENGINE</p>
                <h4 class="text-lg font-black tracking-tight leading-tight">Generate Semua<br />Catatan</h4>
            </div>
            <i class="fas fa-magic text-3xl opacity-50 group-hover:rotate-12 transition"></i>
        </button>
    </div>

    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-8 overflow-x-auto">
            <table class="w-full text-left border-separate border-spacing-y-3">
                <thead class="text-slate-400 text-[10px] uppercase font-black tracking-[0.2em]">
                    <tr>
                        <th class="px-6 py-2">Informasi Siswa</th>
                        <th class="px-6 py-2 text-center">Analisis Nilai</th>
                        <th class="px-6 py-2">Catatan Rekomendasi AI</th>
                        <th class="px-6 py-2 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="table-ai-body" class="text-sm">
                    <tr>
                        <td colspan="4" class="text-center py-20 text-slate-400 italic">
                            <i class="fas fa-info-circle mr-2"></i> Belum ada data. Silakan pilih filter dan muat data.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="ai-rapor.js"></script>
</body>
</html>

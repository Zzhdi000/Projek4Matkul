<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - SIAKAD PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-6 bg-cover bg-center bg-no-repeat"
    style="background-image: url(&quot;asset/sekolah.jpeg&quot;)"
  >
    >
    <div
      class="bg-white w-full max-auto max-w-md rounded-3xl shadow-2xl overflow-hidden"
    >
      <div class="p-8 md:p-10">
        <div class="text-center mb-10">
          <div
            class="bg-blue-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4"
          >
            <i class="fas fa-graduation-cap text-3xl text-blue-900"></i>
          </div>
          <h2
            class="text-2xl font-black text-gray-800 uppercase tracking-tight"
          >
            SIAKAD PRO
          </h2>
          <p class="text-gray-500 text-sm">
            Sistem Informasi Akademik SD Unggul
          </p>
        </div>

        <form id="loginForm" class="space-y-5">
          <div>
            <label
              class="block text-xs font-bold text-gray-700 uppercase mb-2 ml-1"
              >Username / NISN</label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400"
              >
                <i class="fas fa-user text-sm"></i>
              </span>
              <input
                type="text"
                id="username"
                placeholder="Masukkan username..."
                class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm"
                required
              />
            </div>
          </div>

          <div>
            <label
              class="block text-xs font-bold text-gray-700 uppercase mb-2 ml-1"
              >Password</label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400"
              >
                <i class="fas fa-lock text-sm"></i>
              </span>
              <input
                type="password"
                id="password"
                placeholder="••••••••"
                class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm"
                required
              />
            </div>
          </div>

          <button
            type="submit"
            class="w-full bg-blue-900 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-800 transition-all transform active:scale-95"
          >
            Masuk ke Sistem
          </button>
        </form>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="firebase-config.js"></script>

    <script src="login.js"></script>
  </body>
</html>

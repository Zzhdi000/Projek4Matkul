    <a href="admin-nilai.html" class="flex items-center py-3 px-4 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition">

      <div class="flex-1 flex flex-col">
        <header class="bg-white shadow-sm py-4 px-8 flex justify-between items-center">
          <h2 class="text-xl font-bold text-slate-800 tracking-tight uppercase">Selamat Datang, Admin !</h2>
          <div class="flex items-center space-x-3">
            <div class="text-right mr-2 hidden sm:block">
              <p class="text-xs font-bold text-slate-800 uppercase">Administrator</p>
              <p class="text-[10px] text-slate-400 font-medium">Sistem Informasi Akademik</p>
            </div>
            <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-white font-bold text-sm border-2 border-white shadow-sm">
              AD
            </div>
          </div>
        </header>

        <main class="p-8 space-y-8">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6 animate-fadeIn">
            <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm flex items-center space-x-4">
              <div class="w-14 h-14 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-user-tie"></i></div>
              <div>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Jumlah Guru</p>
                <h3 class="text-2xl font-black text-slate-800">24</h3>
              </div>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm flex items-center space-x-4">
              <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-user-graduate"></i></div>
              <div>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Jumlah Siswa</p>
                <h3 class="text-2xl font-black text-slate-800">458</h3>
              </div>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm flex items-center space-x-4">
              <div class="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-book-open"></i></div>
              <div>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Mata Pelajaran</p>
                <h3 class="text-2xl font-black text-slate-800">12</h3>
              </div>
            </div>
          </div>

            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
              <div>
                <h3 class="text-lg font-bold text-slate-800 uppercase tracking-tight">Statistik Data Akademik</h3>
                <p class="text-slate-400 text-xs font-medium">Visualisasi perbandingan total entitas sistem</p>
              </div>
              
              <div class="flex space-x-2">
                <select class="bg-slate-100 border-none rounded-xl text-xs font-bold py-2.5 px-4 outline-none focus:ring-2 focus:ring-blue-500 transition">
                  <option>Maret</option>
                  <option>April</option>
                </select>
                <select class="bg-slate-100 border-none rounded-xl text-xs font-bold py-2.5 px-4 outline-none focus:ring-2 focus:ring-blue-500 transition">
                  <option>2026</option>
                  <option>2025</option>
                </select>
              </div>
            </div>
            
            <div class="relative h-[350px] w-full">
              <canvas id="mainStatsChart"></canvas>
            </div>
          </div>

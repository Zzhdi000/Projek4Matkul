    <style>
        :root {
            /* Palette Color Sesuai Dashboard */
            --accent-blue: #63a4ff;
            --card-blue: #8198f9;
            --card-purple: #c096ff;
            --card-yellow: #f1c973;
            --card-green: #7fd69e;
            
            --bg-body: #FDFDFB;
            --bg-sidebar: #FFFFFF;
            --text-main: #2D2D2D;
            --card-bg: #FFFFFF;
            --border: rgba(0,0,0,0.1);

            /* WARNA TEKS GRID (Mode Terang: Hitam) */
            --text-grid: #000000;
        }

        .dark-mode {
            --bg-body: #0F0F12; 
            --bg-sidebar: #000000;
            --text-main: #FFFFFF;
            --card-bg: rgba(30, 30, 35, 0.8); 
            --border: rgba(255, 255, 255, 0.15);

            /* WARNA TEKS GRID (Mode Gelap: Putih) */
            --text-grid: #FFFFFF;

            background: radial-gradient(circle at 80% 0%, #432e1f 0%, #0F0F12 50%) !important;
        }


        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: all 0.4s ease;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .glass-card {
            background-color: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
        }

        .nav-link {
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 13px;
            color: #555;
            font-weight: 700;
        }

        .dark-mode .nav-link { color: #9CA3AF; }

        .nav-link.active {
            background-color: var(--accent-blue);
            color: white !important;
            box-shadow: 0 8px 20px -6px var(--accent-blue);
        }

        .group-label {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-blue);
            margin: 25px 0 10px 16px;
        }

        /* Time Grid Layout */
        .schedule-grid {
            display: grid;
            grid-template-columns: 100px repeat(6, 1fr);
            border-top: 1px solid var(--border);
        }

        .grid-header {
            padding: 15px;
            text-align: center;
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-grid); /* Menggunakan Variabel Dinamis */
            border-bottom: 1px solid var(--border);
        }

        .time-slot {
            padding: 25px 10px;
            text-align: center;
            font-size: 10px;
            font-weight: 800;
            color: var(--text-grid); /* Menggunakan Variabel Dinamis */
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .cell {
            padding: 10px;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            min-height: 110px;
        }

        .event-card {
            border-radius: 14px;
            padding: 10px;
            color: white;
            font-size: 10px;
            margin-bottom: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .btn-logout {
        color: #ef4444 !important;
        border: 1.5px solid transparent;
      }
      .btn-logout:hover {
        background-color: #fef2f2 !important; /* Merah sangat muda saat hover */
        border-color: #fee2e2;
      }

      .dark-mode .btn-logout:hover {
        background-color: rgba(239, 68, 68, 0.1) !important;
      }

        .bg-blue { background-color: var(--card-blue); }
        .bg-purple { background-color: var(--card-purple); }
        .bg-yellow { background-color: var(--card-yellow); }
        .bg-green { background-color: var(--card-green); }
        .bg-red { background-color: #f87171; }
        .bg-indigo { background-color: #818cf8; }
        .bg-pink { background-color: #f472b6; }
        .bg-violet { background-color: #a78bfa; }
        .bg-cyan { background-color: #67e8f9; }
        .bg-orange { background-color: #f97316; }
        .bg-teal { background-color: #14b8a6; }
    </style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

<script>
    function toggleTheme() {
    const body = document.body;
    const icon = document.getElementById("themeIcon");

    body.classList.toggle("dark-mode");

    const isDark = body.classList.contains("dark-mode");

    // simpan ke localStorage
    localStorage.setItem("theme", isDark ? "dark" : "light");

    icon.classList.toggle("fa-moon");
    icon.classList.toggle("fa-sun");
}

    function handleLogout() {
        Swal.fire({
            title: 'Keluar Sistem',
            text: "Apakah Anda yakin?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#63a4ff',
            confirmButtonText: 'Ya, Keluar'
        }).then((result) => {
            if (result.isConfirmed) window.location.href = "login.html";
        });
    }

    async function loadJadwal() {
  const snapshot = await db.collection("jadwal_guru").get();

  const hariIndex = {
    senin: 1,
    selasa: 2,
    rabu: 3,
    kamis: 4,
    jumat: 5,
    sabtu: 6
  };

  const cells = document.querySelectorAll(".cell");

  snapshot.forEach(doc => {
    const data = doc.data();
    const jadwal = data.jadwal;

    Object.keys(jadwal).forEach(hari => {
      const events = jadwal[hari];
      const col = hariIndex[hari];

      events.forEach(ev => {
        function getRowIndex(jam) {
  if (jam.includes("07") || jam.includes("08")) return 0;
  if (jam.includes("09") || jam.includes("10")) return 1;
  return 0;
}

const rowIndex = getRowIndex(ev.jam);
const cellIndex = rowIndex * 6 + (col - 1);
        const cell = cells[cellIndex];

        if (!cell) return;

       const el = document.createElement("div");

// ⬇️ TAMBAH DI SINI
const colors = ["bg-blue", "bg-purple", "bg-yellow", "bg-green", "bg-red", "bg-indigo", "bg-pink", "bg-cyan", "bg-teal"];
el.className = "event-card " + colors[Math.floor(Math.random() * colors.length)];

        el.innerHTML = `
          <p class="font-black uppercase">${data.mapel}</p>
          <p class="opacity-80">${data.nama} (${ev.kelas})</p>
          <p class="opacity-60 text-[9px]">${ev.jam}</p>
        `;

        cell.appendChild(el);
      });
    });
  });
}

loadJadwal();
function loadTheme() {
    const savedTheme = localStorage.getItem("theme");

    const body = document.body;
    const icon = document.getElementById("themeIcon");

    if (savedTheme === "dark") {
        body.classList.add("dark-mode");
        icon.classList.remove("fa-moon");
        icon.classList.add("fa-sun");
    }
}

loadTheme();
</script>

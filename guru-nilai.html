    <script>
      // ==========================================
      // 1. KONFIGURASI ELEMEN
      // ==========================================
      const profileBtn = document.getElementById("profileBtn");
      const profileDropdown = document.getElementById("profileDropdown");
      const dropdownContent = document.getElementById("dropdownContent");

      // ==========================================
      // 2. FUNGSI TOGGLE MATA (SPAN & INPUT)
      // ==========================================
      function toggleViewPassword(e, targetId, iconId) {
        if (e) e.stopPropagation();

        const target = document.getElementById(targetId);
        const icon = document.getElementById(iconId);
        const dummyPassword = "gurupengampu123";

        // Jika target adalah SPAN (Tampilan awal)
        if (target.tagName === "SPAN") {
          if (target.innerText === "••••••••") {
            target.innerText = dummyPassword;
            icon.classList.replace("fa-eye", "fa-eye-slash");
            target.classList.replace("text-slate-500", "text-slate-800");
          } else {
            target.innerText = "••••••••";
            icon.classList.replace("fa-eye-slash", "fa-eye");
            target.classList.replace("text-slate-800", "text-slate-500");
          }
        }
        // Jika target adalah INPUT (Form Update)
        else if (target.tagName === "INPUT") {
          if (target.type === "password") {
            target.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
          } else {
            target.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
          }
        }
      }

      // ==========================================
      // 3. LOGIKA BUKA/TUTUP DROPDOWN
      // ==========================================
      profileBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        profileDropdown.classList.toggle("hidden");
        if (!profileDropdown.classList.contains("hidden")) {
          resetDropdown(); // Selalu balik ke profil saat dibuka
        }
      });

      window.addEventListener("click", (e) => {
        if (
          !profileBtn.contains(e.target) &&
          !profileDropdown.contains(e.target)
        ) {
          profileDropdown.classList.add("hidden");
        }
      });

      // ==========================================
      // 4. TAMPILAN 1: PROFIL GURU
      // ==========================================
      function resetDropdown(e) {
        if (e) e.stopPropagation();
        dropdownContent.innerHTML = `
      <div class="animate-fadeIn">
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Mata Pelajaran</label>
          <div class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-2 text-sm font-bold text-slate-500 mb-3 select-none" style="cursor: not-allowed;">
            Bahasa Indonesia
          </div>
        </div>

        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Password Guru</label>
          <div class="relative w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-2 flex items-center justify-between mb-3">
            <span id="passText" class="text-sm font-bold text-slate-500 select-none">••••••••</span>
            <button type="button" onclick="toggleViewPassword(event, 'passText', 'eyeIconFront')" class="text-slate-300 hover:text-blue-500 transition focus:outline-none">
              <i id="eyeIconFront" class="fas fa-eye text-xs"></i>
            </button>
          </div>
        </div>

        <button onclick="ubahKeFormPassword(event)" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl text-xs font-bold transition shadow-lg shadow-blue-200 mt-2">
          Update Password
        </button>
        
        <hr class="border-slate-50 my-2">
        <a href="logout.php" class="flex items-center justify-center text-red-500 text-[11px] font-bold hover:bg-red-50 py-2 rounded-lg transition uppercase">
          <i class="fas fa-sign-out-alt mr-2"></i> KELUAR SISTEM
        </a>
      </div>
    `;
      }

      // ==========================================
      // 5. TAMPILAN 2: FORM UPDATE PASSWORD
      // ==========================================
      function ubahKeFormPassword(e) {
        if (e) e.stopPropagation();
        dropdownContent.innerHTML = `
      <div class="animate-fadeIn">
        <div class="flex items-center mb-4">
          <button onclick="resetDropdown(event)" class="text-slate-400 hover:text-slate-800 transition mr-2">
            <i class="fas fa-arrow-left text-xs"></i>
          </button>
          <h4 class="text-xs font-black text-slate-800 uppercase">Ganti Password Guru</h4>
        </div>

        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Password Lama</label>
        <div class="relative mb-3">
          <input type="password" id="oldPass" placeholder="••••••••" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition">
          <button type="button" onclick="toggleViewPassword(event, 'oldPass', 'eyeIconOld')" class="absolute right-3 top-2.5 text-slate-300 hover:text-blue-500 transition focus:outline-none">
            <i id="eyeIconOld" class="fas fa-eye text-xs"></i>
          </button>
        </div>
        
        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Password Baru</label>
        <div class="relative mb-3">
          <input type="password" id="newPass" placeholder="Minimal 8 karakter" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition">
          <button type="button" onclick="toggleViewPassword(event, 'newPass', 'eyeIconNew')" class="absolute right-3 top-2.5 text-slate-300 hover:text-blue-500 transition focus:outline-none">
            <i id="eyeIconNew" class="fas fa-eye text-xs"></i>
          </button>
        </div>
        
        <button onclick="simpanDanReset(event)" class="w-full bg-slate-800 hover:bg-emerald-600 text-white py-3 rounded-xl text-xs font-bold transition shadow-lg mt-2 uppercase tracking-wider">
          Simpan Perubahan
        </button>
      </div>
    `;
      }

      function simpanDanReset(e) {
        if (e) e.stopPropagation();
        const oldP = document.getElementById("oldPass").value;
        const newP = document.getElementById("newPass").value;

        if (oldP && newP) {
          alert("Password Guru Berhasil Diperbarui!");
          resetDropdown();
          profileDropdown.classList.add("hidden");
        } else {
          alert("Harap isi semua kolom!");
        }
      }

      // Jalankan reset dropdown saat halaman pertama dimuat
      resetDropdown();

      // Bersihkan sisa CSS default browser
      const style = document.createElement("style");
      style.innerHTML = `
    input::-ms-reveal, input::-ms-clear { display: none !important; }
    input::-webkit-contacts-auto-fill-button, 
    input::-webkit-credentials-auto-fill-button { display: none !important; }
  `;
      document.head.appendChild(style);
    </script>

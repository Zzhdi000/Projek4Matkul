<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Nilai Siswa - Guru Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fadeIn {
        animation: fadeIn 0.3s ease-out forwards;
      }
      .swal2-popup {
        border-radius: 2rem !important;
        padding: 2rem !important;
      }
      .swal2-title {
        font-weight: 800 !important;
        color: #1e293b !important;
      }
      .swal2-input,
      .swal2-textarea {
        border-radius: 1rem !important;
        font-size: 0.9rem !important;
        background: #f8fafc !important;
        border: 1px solid #e2e8f0 !important;
        text-align: left !important;
        padding: 0 1rem !important;
      }
    </style>
  </head>
  <body class="bg-slate-50 font-sans text-slate-900">
    <div class="flex min-h-screen">
      <aside
        class="w-64 bg-[#0f172a] text-white flex-shrink-0 hidden md:flex flex-col h-screen sticky top-0"
      >
        <div class="p-6 border-b border-slate-800 flex items-center space-x-3">
          <i class="fas fa-user-shield text-2xl text-blue-400"></i>
          <span class="text-xl font-bold tracking-tight">BAGIAN GURU</span>
        </div>

        <nav
          class="flex-1 mt-6 px-4 space-y-2 overflow-y-auto custom-scrollbar"
        >
          <a
            href="guru-dashboard.html"
            class="flex items-center py-3 px-4 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition"
          >
            <i class="fas fa-database mr-3"></i> Beranda
          </a>
          <a
            href="guru-presensi.html"
            class="flex items-center py-3 px-4 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition"
          >
            <i class="fas fa-user-check mr-3"></i> Presensi Siswa
          </a>
          <a
            href="guru-nilai.html"
            class="flex items-center py-3 px-4 bg-[#2563eb] text-white rounded-xl transition shadow-lg shadow-blue-900/20"
          >
            <i class="fas fa-file-invoice mr-3"></i> Nilai Siswa
          </a>
          <a
            href="guru-jadwal.html"
            class="flex items-center py-3 px-4 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition"
          >
            <i class="fas fa-calendar-alt mr-3"></i> Jadwal Mengajar
          </a>
        </nav>

        <div class="p-6 border-t border-slate-800 bg-[#0f172a]">
          <a
            href="login.html#login"
            class="flex items-center text-red-400 hover:text-red-300 font-bold transition"
          >
            <i class="fas fa-sign-out-alt mr-3"></i> Keluar
          </a>
        </div>
      </aside>

      <div class="flex-1 flex flex-col">
        <header
          class="bg-white shadow-sm py-4 px-8 flex justify-between items-center sticky top-0 z-40"
        >
          <h2 class="text-xl font-bold text-slate-800 tracking-tight">
            Nilai Siswa
          </h2>
          <div class="relative">
            <button
              id="profileBtn"
              class="flex items-center space-x-3 focus:outline-none group"
            >
              <div class="text-right mr-2 hidden sm:block">
                <p
                  class="text-[10px] font-bold bg-blue-100 text-blue-700 px-2 py-0.5 rounded-md uppercase inline-block mb-1"
                >
                  Guru Pengampu
                </p>
                <p
                  class="text-xs font-bold text-slate-800 uppercase group-hover:text-blue-600 transition"
                ></p>
              </div>
              <div
                class="w-10 h-10 rounded-full bg-[#0091d5] flex items-center justify-center text-white font-bold text-sm border-2 border-white shadow-md group-hover:scale-105 transition-all"
              ></div>
            </button>
            <div
              id="profileDropdown"
              class="absolute right-0 mt-3 w-72 bg-white rounded-[2rem] shadow-2xl border border-slate-100 p-6 hidden animate-fadeIn z-50"
            >
              <div class="text-center mb-4">
                <div
                  class="w-16 h-16 bg-blue-50 rounded-full mx-auto flex items-center justify-center text-[#0091d5] text-xl font-black border-4 border-blue-100 mb-2"
                ></div>
                <h4 class="text-sm font-black text-slate-800"></h4>
                <p
                  class="text-[10px] text-slate-400 font-bold uppercase tracking-widest"
                ></p>
              </div>
              <div class="space-y-3" id="dropdownContent"></div>
            </div>
          </div>
        </header>

        <main class="p-8">
          <div
            class="flex flex-wrap gap-4 mb-8 items-center bg-white p-6 rounded-3xl shadow-sm border border-slate-100"
          >
            <div class="flex-1 min-w-[200px] relative">
              <i
                class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"
              ></i>
              <input
                type="text"
                id="search-siswa"
                placeholder="Cari Nama Siswa..."
                class="w-full pl-11 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm"
              />
            </div>

            <select
              id="filter-kelas"
              class="p-2.5 bg-white border border-slate-200 rounded-xl text-sm font-semibold outline-none focus:ring-2 focus:ring-blue-500"
            >
              <option value="all">Pilih Kelas</option>
              <option value="1-A">1-A</option>
              <option value="1-B">1-B</option>
              <option value="2-A">2-A</option>
              <option value="2-B">2-B</option>
              <option value="3-A">3-A</option>
              <option value="3-B">3-B</option>
              <option value="4-A">4-A</option>
              <option value="4-B">4-B</option>
              <option value="5-A">5-A</option>
              <option value="5-B">5-B</option>
              <option value="6-A">6-A</option>
              <option value="6-B">6-B</option>
            </select>
            <select
              id="filter-semester"
              class="p-2.5 bg-white border border-slate-200 rounded-xl text-sm font-semibold outline-none focus:ring-2 focus:ring-blue-500"
            >
              <option>Pilih Semester</option>
              <option>Ganjil</option>
              <option>Genap</option>
            </select>
            <select
              id="filter-mapel"
              class="p-2.5 bg-white border border-slate-200 rounded-xl text-sm font-semibold outline-none focus:ring-2 focus:ring-blue-500"
            >
              <option>Pilih Mapel</option>
              <option>Matematika</option>
              <option>Informatika</option>
            </select>

            <button
              id="export-pdf-btn"
              onclick="exportToPDF()"
              class="bg-slate-800 text-white px-6 py-2.5 rounded-xl text-sm font-bold hover:bg-slate-900 transition flex items-center"
            >
              <i class="fas fa-file-pdf mr-2"></i> Cetak PDF
            </button>
          </div>

          <div
            class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden"
          >
            <div class="p-6 overflow-x-auto">
              <table
                class="w-full text-left border-separate border-spacing-y-2"
              >
                <thead>
                  <tr
                    class="text-slate-400 text-[10px] uppercase font-black tracking-widest"
                  >
                    <th class="px-6 py-3">NISN</th>
                    <th class="px-6 py-3">Nama Siswa</th>
                    <th class="px-6 py-3 text-center">Kelas</th>
                    <th class="px-6 py-3 text-center">UH1</th>
                    <th class="px-6 py-3 text-center">UH2</th>
                    <th class="px-6 py-3 text-center">UTS</th>
                    <th class="px-6 py-3 text-center">Rata-rata</th>
                    <th class="px-6 py-3 text-center">Aksi</th>
                  </tr>
                </thead>
                <tbody id="table-body-nilai" class="text-sm"></tbody>
              </table>
            </div>
            <div class="p-8 border-t border-slate-50 flex justify-end">
              <button
                id="btn-simpan-nilai"
                class="bg-[#2563eb] text-white px-10 py-3 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all active:scale-95"
              >
                Simpan Perubahan
              </button>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script src="firebase-config.js"></script>
    <script src="guru-nilai.js"></script>
  </body>
</html>

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guru Dashboard - SIAKAD PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fadeIn {
        animation: fadeIn 0.3s ease-out forwards;
      }
      .swal2-popup {
        border-radius: 2rem !important;
        padding: 2rem !important;
      }
      .swal2-title {
        font-weight: 800 !important;
        color: #1e293b !important;
      }
      .swal2-input,
      .swal2-textarea {
        border-radius: 1rem !important;
        font-size: 0.9rem !important;
        background: #f8fafc !important;
        border: 1px solid #e2e8f0 !important;
        padding: 0 1rem !important;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #0f172a;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="bg-slate-50 font-sans text-slate-900">
    <div class="flex min-h-screen">
      <aside
        class="w-64 bg-[#0f172a] text-white flex-shrink-0 hidden md:flex flex-col h-screen sticky top-0"
      >
        <div class="p-6 border-b border-slate-800 flex items-center space-x-3">
          <i class="fas fa-user-shield text-2xl text-blue-400"></i>
          <span class="text-xl font-bold tracking-tight">GURU PANEL</span>
        </div>
        <nav
          class="flex-1 mt-6 px-4 space-y-2 overflow-y-auto custom-scrollbar"
        >
          <a
            href="guru-dashboard.html"
            class="flex items-center py-3 px-4 bg-[#2563eb] text-white rounded-xl transition shadow-lg shadow-blue-900/20"
          >
            <i class="fas fa-database mr-3"></i> Beranda
          </a>
          <a
            href="guru-presensi.html"
            class="flex items-center py-3 px-4 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition"
          >
            <i class="fas fa-user-check mr-3"></i> Presensi Siswa
          </a>
          <a
            href="guru-nilai.html"
            class="flex items-center py-3 px-4 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition"
          >
            <i class="fas fa-file-invoice mr-3"></i> Input Nilai
          </a>
          <a
            href="guru-jadwal.html"
            class="flex items-center py-3 px-4 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition"
          >
            <i class="fas fa-calendar-alt mr-3"></i> Jadwal Mengajar
          </a>
        </nav>
        <div class="p-6 border-t border-slate-800 bg-[#0f172a]">
          <a
            href="login.html#login"
            class="flex items-center text-red-400 hover:text-red-300 font-bold transition"
          >
            <i class="fas fa-sign-out-alt mr-3"></i> Logout
          </a>
        </div>
      </aside>

      <div class="flex-1 flex flex-col">
        <header
          class="bg-white shadow-sm py-4 px-8 flex justify-between items-center sticky top-0 z-40"
        >
          <div class="flex items-center gap-4">
            <h2 class="text-xl font-bold text-slate-800 tracking-tight">
              Data Siswa:
            </h2>
            <select
              id="filter-kelas-global"
              onchange="loadDataSiswa()"
              class="p-2 bg-slate-100 border-none rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer"
            >
              <option value="all">Semua Kelas</option>
              <option value="1-A">Kelas 1-A</option>
              <option value="1-B">Kelas 1-B</option>
              <option value="2-A">Kelas 2-A</option>
              <option value="2-B">Kelas 2-B</option>
              <option value="3-A">Kelas 3-A</option>
              <option value="3-B">Kelas 3-B</option>
              <option value="4-A">Kelas 4-A</option>
              <option value="4-B">Kelas 4-B</option>
              <option value="5-A">Kelas 5-A</option>
              <option value="5-B">Kelas 5-B</option>
              <option value="6-A">Kelas 6-A</option>
              <option value="6-B">Kelas 6-B</option>
            </select>
          </div>

          <div class="relative">
            <button
              id="profileBtn"
              class="flex items-center space-x-3 focus:outline-none group"
            >
              <div class="text-right mr-2 hidden sm:block">
                <p
                  class="text-[10px] font-bold bg-blue-100 text-blue-700 px-2 py-0.5 rounded-md uppercase inline-block mb-1"
                >
                  Guru Pengampu
                </p>
                <p
                  class="text-xs font-bold text-slate-800 uppercase group-hover:text-blue-600 transition"
                >
                  Endang Darwati, S.Pd
                </p>
              </div>
              <div
                class="w-10 h-10 rounded-full bg-[#0091d5] flex items-center justify-center text-white font-bold text-sm border-2 border-white shadow-md group-hover:scale-105 transition-all"
              >
                ED
              </div>
            </button>
            <div
              id="profileDropdown"
              class="absolute right-0 mt-3 w-72 bg-white rounded-[2rem] shadow-2xl border border-slate-100 p-6 hidden animate-fadeIn z-50"
            >
              <div class="text-center mb-4">
                <div
                  class="w-16 h-16 bg-blue-50 rounded-full mx-auto flex items-center justify-center text-[#0091d5] text-xl font-black border-4 border-blue-100 mb-2"
                >
                  ED
                </div>
                <h4 class="text-sm font-black text-slate-800">
                  Endang Darwati
                </h4>
                <p
                  class="text-[10px] text-slate-400 font-bold uppercase tracking-widest"
                >
                  NIP: 19850101XXXXXXXX
                </p>
              </div>
              <div class="space-y-3" id="dropdownContent"></div>
            </div>
          </div>
        </header>

        <main class="p-8">
          <div class="mb-10">
            <div class="flex items-center justify-between mb-6">
              <div>
                <h3
                  class="text-xl font-black text-slate-800 uppercase tracking-tight"
                >
                  Jadwal Mengajar Hari Ini
                </h3>
                <p class="text-sm text-slate-500 font-medium">
                  <span id="currentDate" class="font-bold text-blue-600"
                    >...</span
                  >
                  <span class="mx-2 text-slate-300">|</span>
                  <span
                    id="schedule-count"
                    class="font-bold text-slate-700 italic italic"
                    >Mengecek sesi...</span
                  >
                </p>
              </div>
              <div
                id="live-clock"
                class="px-6 py-2 bg-white border border-slate-100 rounded-2xl shadow-sm text-lg font-black text-slate-700 min-w-[120px] text-center"
              >
                00:00:00
              </div>
            </div>
            <div
              id="schedule-container"
              class="grid grid-cols-1 md:grid-cols-3 gap-6"
            ></div>
          </div>

          <div
            class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden"
          >
            <div class="flex border-b border-slate-100 bg-slate-50/50">
              <button
                id="tab-daftar"
                onclick="switchTab('daftar')"
                class="px-8 py-4 text-sm font-bold border-b-2 border-blue-600 text-blue-600 bg-white transition-all"
              >
                Daftar Siswa
              </button>
              <button
                id="tab-data-diri"
                onclick="switchTab('data-diri')"
                class="px-8 py-4 text-sm font-bold text-slate-400 hover:text-slate-600 transition-all"
              >
                Data Diri Siswa
              </button>
            </div>

            <div class="p-8">
              <div id="content-daftar" class="block animate-fadeIn">
                <div class="flex justify-between items-center mb-8">
                  <div class="relative w-72">
                    <i
                      class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"
                    ></i>
                    <input
                      id="search-daftar"
                      type="text"
                      placeholder="Cari nama atau NISN..."
                      class="pl-11 pr-4 py-3 bg-slate-100 border-none rounded-2xl text-sm w-full outline-none focus:ring-2 focus:ring-blue-500 transition shadow-inner"
                    />
                  </div>
                </div>
                <div class="overflow-x-auto">
                  <table class="w-full text-left">
                    <thead
                      class="text-slate-400 text-[10px] uppercase font-black tracking-[0.15em] border-b border-slate-100"
                    >
                      <tr>
                        <th class="px-6 py-4">Nama Siswa</th>
                        <th class="px-6 py-4">NISN</th>
                        <th class="px-6 py-4">Status</th>
                        <th class="px-6 py-4 text-center">Aksi</th>
                      </tr>
                    </thead>
                    <tbody id="body-daftar"></tbody>
                  </table>
                </div>
              </div>

              <div id="content-data-diri" class="hidden animate-fadeIn">
                <div
                  class="flex justify-between items-center mb-8 flex-wrap gap-4"
                >
                  <div class="relative w-72">
                    <i
                      class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"
                    ></i>
                    <input
                      id="search-data-diri"
                      type="text"
                      placeholder="Cari NISN atau Nama..."
                      class="pl-11 pr-4 py-3 bg-slate-100 border-none rounded-2xl text-sm w-full outline-none focus:ring-2 focus:ring-blue-500 transition shadow-inner"
                    />
                  </div>
                  <div class="flex gap-3">
                    <input
                      type="file"
                      id="upload-excel"
                      class="hidden"
                      accept=".xlsx, .xls, .csv"
                      onchange="handleImportExcel(event)"
                    />
                    <button
                      onclick="document.getElementById('upload-excel').click()"
                      class="bg-blue-600 text-white px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-widest shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all flex items-center"
                    >
                      <i class="fas fa-file-import mr-2"></i> Import Excel
                    </button>
                    <button
                      onclick="tambahSiswa()"
                      class="bg-emerald-600 text-white px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-widest shadow-lg shadow-emerald-100 hover:bg-emerald-700 transition-all flex items-center"
                    >
                      <i class="fas fa-plus mr-2"></i> Tambah Manual
                    </button>
                  </div>
                </div>
                <div class="overflow-x-auto">
                  <table
                    class="w-full text-left border-separate border-spacing-y-3"
                  >
                    <thead
                      class="text-slate-400 text-[10px] uppercase font-black tracking-[0.15em]"
                    >
                      <tr>
                        <th class="px-6 py-2">NISN</th>
                        <th class="px-6 py-2">Nama Siswa</th>
                        <th class="px-6 py-2">Nama Wali</th>
                        <th class="px-6 py-2">No. Wali</th>
                        <th class="px-6 py-2">Alamat</th>
                        <th class="px-6 py-2 text-center">Aksi</th>
                      </tr>
                    </thead>
                    <tbody id="body-data-diri"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script>
      // 1. DATA JADWAL
      const listJadwal = [
        {
          id: 1,
          mapel: "Bahasa Indonesia",
          kelas: "4-A",
          ruang: "04",
          mulai: "07:30",
          selesai: "09:00",
          warna: "blue",
        },
        {
          id: 2,
          mapel: "Bahasa Indonesia",
          kelas: "5-B",
          ruang: "12",
          mulai: "09:15",
          selesai: "10:45",
          warna: "indigo",
        },
        {
          id: 3,
          mapel: "Istirahat",
          kelas: "-",
          ruang: "Kantin",
          mulai: "10:45",
          selesai: "11:15",
          warna: "slate",
          isBreak: true,
        },
        {
          id: 4,
          mapel: "Bahasa Indonesia",
          kelas: "6-A",
          ruang: "02",
          mulai: "11:15",
          selesai: "12:30",
          warna: "emerald",
        },
      ];

      let lastScheduleHTML = ""; // Penanda untuk mencegah re-render jika tidak ada perubahan data

      function updateScheduleUI() {
        const now = new Date();

        // Perbaikan Jam Digital: Pad start dengan '0' agar format selalu HH:MM:SS
        const hours = String(now.getHours()).padStart(2, "0");
        const minutes = String(now.getMinutes()).padStart(2, "0");
        const seconds = String(now.getSeconds()).padStart(2, "0");
        document.getElementById("live-clock").innerText =
          `${hours}:${minutes}:${seconds}`;

        const currentTime = now.getHours() * 60 + now.getMinutes();
        const container = document.getElementById("schedule-container");
        const countText = document.getElementById("schedule-count");

        // Filter jadwal aktif (yang belum selesai)
        const jadwalAktif = listJadwal.filter((item) => {
          const [hSelesai, mSelesai] = item.selesai.split(":").map(Number);
          return hSelesai * 60 + mSelesai > currentTime;
        });

        // Tampilan Jika Selesai
        if (jadwalAktif.length === 0) {
          countText.innerText = "Semua tugas hari ini selesai ✨";
          const finishedHTML = `
            <div class="col-span-full bg-emerald-50 border-2 border-dashed border-emerald-200 p-10 rounded-[2.5rem] text-center">
              <i class="fas fa-check-circle text-4xl text-emerald-500 mb-3"></i>
              <p class="text-emerald-800 font-bold uppercase text-xs tracking-widest">Kerja bagus! Jadwal mengajar Anda sudah berakhir.</p>
            </div>`;
          if (lastScheduleHTML !== finishedHTML) {
            container.innerHTML = finishedHTML;
            lastScheduleHTML = finishedHTML;
          }
          return;
        }

        // Tampilan List Jadwal
        countText.innerText = `${jadwalAktif.length} Sesi tersisa`;

        const currentHTML = jadwalAktif
          .map((item, index) => {
            const [hMulai, mMulai] = item.mulai.split(":").map(Number);
            const isOngoing = currentTime >= hMulai * 60 + mMulai;

            const statusLabel = isOngoing
              ? "SEDANG BERLANGSUNG"
              : item.isBreak
                ? "ISTIRAHAT"
                : "SESI " + (index + 1);
            const borderClass = isOngoing
              ? "border-orange-500"
              : `border-${item.warna}-500`;
            const bgClass = isOngoing
              ? "bg-white ring-4 ring-orange-50 scale-[1.02]"
              : item.isBreak
                ? "bg-slate-200/50 opacity-80"
                : "bg-white";
            const textClass = isOngoing
              ? "text-orange-500"
              : `text-${item.warna}-500`;

            return `
            <div class="${bgClass} p-6 rounded-[2.5rem] border-l-[12px] ${borderClass} shadow-sm transition-all relative">
              ${isOngoing ? '<span class="absolute top-4 right-6 flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-orange-500"></span></span>' : ""}
              <div class="flex justify-between items-start mb-4">
                <span class="text-[10px] font-black ${textClass} uppercase tracking-[0.2em]">${statusLabel}</span>
              </div>
              <h4 class="text-lg font-black ${item.isBreak ? "text-slate-400" : "text-slate-800"} leading-tight mb-1">${item.mapel}</h4>
              <p class="text-sm ${item.isBreak ? "text-slate-400" : "text-slate-500"} font-bold mb-4">
                ${item.kelas !== "-" ? "Kelas " + item.kelas : ""} <span class="mx-1 ${item.isBreak ? "hidden" : "text-slate-300"}">•</span> ${item.ruang}
              </p>
              <div class="flex items-center text-xs font-black ${isOngoing ? "text-orange-600 bg-orange-50" : "text-slate-400 bg-slate-50"} rounded-xl px-4 py-2 w-fit">
                <i class="far fa-clock mr-2"></i> ${item.mulai} - ${item.selesai} WIB
              </div>
            </div>`;
          })
          .join("");

        // Hanya update DOM jika konten jadwal berubah (menghindari animasi refresh/flicker tiap detik)
        if (lastScheduleHTML !== currentHTML) {
          container.innerHTML = currentHTML;
          lastScheduleHTML = currentHTML;
        }
      }

      // Inisialisasi & Interval
      setInterval(updateScheduleUI, 1000);
      updateScheduleUI();

      // Logika Profile Dropdown
      const profileBtn = document.getElementById("profileBtn");
      const profileDropdown = document.getElementById("profileDropdown");
      const dropdownContent = document.getElementById("dropdownContent");

      profileBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        profileDropdown.classList.toggle("hidden");
        if (!profileDropdown.classList.contains("hidden")) resetDropdown();
      });

      window.addEventListener("click", (e) => {
        if (
          !profileBtn.contains(e.target) &&
          !profileDropdown.contains(e.target)
        ) {
          profileDropdown.classList.add("hidden");
        }
      });

      function resetDropdown() {
        dropdownContent.innerHTML = `
          <div class="animate-fadeIn">
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Mata Pelajaran</label>
            <div class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-2 text-sm font-bold text-slate-500 mb-3 cursor-not-allowed">Bahasa Indonesia</div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Password Guru</label>
            <div class="relative w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-2 flex items-center justify-between mb-3">
              <span id="passText" class="text-sm font-bold text-slate-500 select-none">••••••••</span>
              <button onclick="toggleViewPassword(event, 'passText', 'eyeIconFront')" class="text-slate-300 hover:text-blue-500 transition"><i id="eyeIconFront" class="fas fa-eye text-xs"></i></button>
            </div>
            <button onclick="ubahKeFormPassword(event)" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl text-xs font-bold transition shadow-lg shadow-blue-200 mt-2">Update Password</button>
            <hr class="border-slate-50 my-2">
            <a href="login.html" class="flex items-center justify-center text-red-500 text-[11px] font-bold hover:bg-red-50 py-2 rounded-lg transition uppercase">
              <i class="fas fa-sign-out-alt mr-2"></i> KELUAR SISTEM
            </a>
          </div>`;
      }

      function ubahKeFormPassword(e) {
        if (e) e.stopPropagation();
        dropdownContent.innerHTML = `
          <div class="animate-fadeIn">
            <div class="flex items-center mb-4">
              <button onclick="resetDropdown(event)" class="text-slate-400 hover:text-slate-800 mr-2"><i class="fas fa-arrow-left text-xs"></i></button>
              <h4 class="text-xs font-black text-slate-800 uppercase">Ganti Password</h4>
            </div>
            <input type="password" id="oldPass" placeholder="Password Lama" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-2 text-sm mb-3 outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="newPass" placeholder="Password Baru" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-2 text-sm mb-3 outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="simpanDanReset(event)" class="w-full bg-slate-800 hover:bg-emerald-600 text-white py-3 rounded-xl text-xs font-bold transition uppercase">Simpan</button>
          </div>`;
      }

      function simpanDanReset(e) {
        if (e) e.stopPropagation();
        Swal.fire({
          title: "Berhasil!",
          text: "Password diperbarui.",
          icon: "success",
          timer: 1500,
          showConfirmButton: false,
        });
        resetDropdown();
        profileDropdown.classList.add("hidden");
      }

      // Set tanggal hari ini
      const options = {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric",
      };
      document.getElementById("currentDate").innerText =
        new Date().toLocaleDateString("id-ID", options);
    </script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="guru.js"></script>
  </body>
</html>

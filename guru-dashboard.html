<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guru Dashboard - SIAKAD PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fadeIn {
        animation: fadeIn 0.3s ease-out forwards;
      }
      .swal2-popup {
        border-radius: 2rem !important;
        padding: 2rem !important;
      }
      .swal2-title {
        font-weight: 800 !important;
        color: #1e293b !important;
      }
      .swal2-input,
      .swal2-textarea {
        border-radius: 1rem !important;
        font-size: 0.9rem !important;
        background: #f8fafc !important;
        border: 1px solid #e2e8f0 !important;
        text-align: left !important;
        padding: 0 1rem !important;
      }
    </style>
  </head>
  <body class="bg-slate-50 font-sans text-slate-900">
    <div class="flex min-h-screen">
      <aside
        class="w-64 bg-[#0f172a] text-white flex-shrink-0 hidden md:flex flex-col"
      >
        <div class="p-6 border-b border-slate-800 flex items-center space-x-3">
          <i class="fas fa-user-shield text-2xl text-blue-400"></i>
          <span class="text-xl font-bold tracking-tight">GURU PANEL</span>
        </div>
        <nav class="flex-1 mt-6 px-4 space-y-2">
          <a
            href="guru-dashboard.html"
            class="flex items-center py-3 px-4 bg-[#2563eb] text-white rounded-xl transition shadow-lg shadow-blue-900/20"
          >
            <i class="fas fa-database mr-3"></i> Beranda
          </a>
          <a
            href="guru-presensi.html"
            class="flex items-center py-3 px-4 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition"
          >
            <i class="fas fa-user-check mr-3"></i> Presensi Siswa
          </a>
          <a
            href="guru-nilai.html"
            class="flex items-center py-3 px-4 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition"
          >
            <i class="fas fa-file-invoice mr-3"></i> Input Nilai
          </a>
          <a
            href="guru-ai-rapot.html"
            class="flex items-center py-3 px-4 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition"
          >
            <i class="fas fa-robot mr-3"></i> AI Rapot
          </a>
        </nav>
        <div class="p-6 border-t border-slate-800">
          <a
            href="#"
            class="flex items-center text-red-400 hover:text-red-300 font-bold"
          >
            <i class="fas fa-sign-out-alt mr-3"></i> Logout
          </a>
        </div>
      </aside>

      <div class="flex-1 flex flex-col">
        <header
          class="bg-white shadow-sm py-4 px-8 flex justify-between items-center"
        >
          <h2 class="text-xl font-bold text-slate-800 tracking-tight">
            Daftar Siswa Kelas 4-A
          </h2>
          <div class="flex items-center space-x-3">
            <span
              class="text-[10px] font-bold bg-blue-100 text-blue-700 px-3 py-1 rounded-full uppercase"
              >Guru Pengampu</span
            >
            <div
              class="w-10 h-10 rounded-full bg-[#0091d5] flex items-center justify-center text-white font-bold text-sm shadow-inner"
            >
              ED
            </div>
          </div>
        </header>

        <main class="p-8">
          <div
            class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden"
          >
            <div class="flex border-b border-slate-100 bg-slate-50/50">
              <button
                id="tab-daftar"
                onclick="switchTab('daftar')"
                class="px-8 py-4 text-sm font-bold border-b-2 border-blue-600 text-blue-600 bg-white transition-all"
              >
                Daftar Siswa
              </button>
              <button
                id="tab-data-diri"
                onclick="switchTab('data-diri')"
                class="px-8 py-4 text-sm font-bold text-slate-400 hover:text-slate-600 transition-all"
              >
                Data Diri Siswa
              </button>
            </div>

            <div class="p-8">
              <div id="content-daftar" class="block animate-fadeIn">
                <div class="flex justify-between items-center mb-8">
                  <div class="relative w-72">
                    <i
                      class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"
                    ></i>
                    <input
                      id="search-daftar"
                      type="text"
                      placeholder="Cari nama atau NISN..."
                      class="pl-11 pr-4 py-3 bg-slate-100 border-none rounded-2xl text-sm w-full outline-none focus:ring-2 focus:ring-blue-500 transition shadow-inner"
                    />
                  </div>
                </div>
                <div class="overflow-x-auto">
                  <table class="w-full text-left">
                    <thead
                      class="text-slate-400 text-[10px] uppercase font-black tracking-[0.15em] border-b border-slate-100"
                    >
                      <tr>
                        <th class="px-6 py-4">Nama Siswa</th>
                        <th class="px-6 py-4">NISN</th>
                        <th class="px-6 py-4">Status</th>
                        <th class="px-6 py-4 text-center">Aksi</th>
                      </tr>
                    </thead>
                    <tbody
                      id="body-daftar"
                      class="divide-y divide-slate-100 text-sm"
                    >
                      <tr class="hover:bg-slate-50/80 transition">
                        <td
                          class="px-6 py-5 font-bold text-slate-700 uppercase tracking-tight"
                        >
                          Aditya Pratama
                        </td>
                        <td class="px-6 py-5 font-mono text-slate-400">
                          01234456
                        </td>
                        <td class="px-6 py-5">
                          <span
                            class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-lg text-[10px] font-black uppercase"
                            >Aktif</span
                          >
                        </td>
                        <td class="px-6 py-5 text-center">
                          <button
                            onclick="editSiswa('01234456')"
                            class="text-blue-500 hover:text-blue-700 mx-2"
                          >
                            <i class="fas fa-edit"></i>
                          </button>
                          <button
                            onclick="hapusSiswa('01234456')"
                            class="text-red-500 hover:text-red-700 mx-2"
                          >
                            <i class="fas fa-trash"></i>
                          </button>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>

              <div id="content-data-diri" class="hidden animate-fadeIn">
                <div class="flex justify-between items-center mb-8">
                  <div class="relative w-72">
                    <i
                      class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"
                    ></i>
                    <input
                      id="search-data-diri"
                      type="text"
                      placeholder="Cari NISN atau Nama..."
                      class="pl-11 pr-4 py-3 bg-slate-100 border-none rounded-2xl text-sm w-full outline-none focus:ring-2 focus:ring-blue-500 transition shadow-inner"
                    />
                  </div>
                  <button
                    onclick="tambahSiswa()"
                    class="bg-emerald-600 text-white px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-widest shadow-lg shadow-emerald-100 hover:bg-emerald-700 transition-all flex items-center"
                  >
                    <i class="fas fa-plus mr-2"></i> Tambah Siswa
                  </button>
                </div>
                <div class="overflow-x-auto">
                  <table
                    class="w-full text-left border-separate border-spacing-y-3"
                  >
                    <thead
                      class="text-slate-400 text-[10px] uppercase font-black tracking-[0.15em]"
                    >
                      <tr>
                        <th class="px-6 py-2">NISN</th>
                        <th class="px-6 py-2">Nama Siswa</th>
                        <th class="px-6 py-2">Nama Wali</th>
                        <th class="px-6 py-2">No. Wali</th>
                        <th class="px-6 py-2">Alamat</th>
                        <th class="px-6 py-2 text-center">Aksi</th>
                      </tr>
                    </thead>
                    <tbody id="body-data-diri" class="text-sm">
                      <tr
                        class="bg-white border border-slate-100 shadow-sm rounded-2xl hover:shadow-md transition-all"
                      >
                        <td
                          class="px-6 py-5 font-mono text-slate-400 rounded-l-2xl"
                        >
                          01234456
                        </td>
                        <td
                          class="px-6 py-5 font-bold text-slate-700 uppercase tracking-tight"
                        >
                          Aditya Pratama
                        </td>
                        <td class="px-6 py-5 text-slate-600 font-medium">
                          SUGENG PRIBADI
                        </td>
                        <td class="px-6 py-5 font-mono text-slate-500">
                          08123456789
                        </td>
                        <td class="px-6 py-5 text-slate-400 italic">
                          Jl. Mawar No. 12, Surabaya
                        </td>
                        <td class="px-6 py-5 text-center rounded-r-2xl">
                          <button
                            onclick="editSiswa('01234456')"
                            class="text-blue-500 hover:text-blue-700 mx-2"
                          >
                            <i class="fas fa-edit"></i>
                          </button>
                          <button
                            onclick="hapusSiswa('01234456')"
                            class="text-red-500 hover:text-red-700 mx-2"
                          >
                            <i class="fas fa-trash"></i>
                          </button>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script>
      // FUNGSI SWITCH TAB (SUDAH DIPERBAIKI CLASSPATH-NYA)
      function switchTab(tab) {
        const dTab = document.getElementById("tab-daftar");
        const ddTab = document.getElementById("tab-data-diri");
        const dCont = document.getElementById("content-daftar");
        const ddCont = document.getElementById("content-data-diri");

        const active =
          "px-8 py-4 text-sm font-bold border-b-2 border-blue-600 text-blue-600 bg-white transition-all";
        const inactive =
          "px-8 py-4 text-sm font-bold text-slate-400 hover:text-slate-600 transition-all";

        if (tab === "daftar") {
          dTab.className = active;
          ddTab.className = inactive;
          dCont.classList.remove("hidden");
          ddCont.classList.add("hidden");
        } else {
          ddTab.className = active;
          dTab.className = inactive;
          ddCont.classList.remove("hidden");
          dCont.classList.add("hidden");
        }
      }

      function setupSearch(inputId, tableBodyId) {
        document.getElementById(inputId).addEventListener("input", function () {
          const filter = this.value.toLowerCase();

          // Kita ambil semua baris di body tabel yang ditentukan
          document.querySelectorAll(`#${tableBodyId} tr`).forEach((row) => {
            // Ambil kolom nama (untuk body-daftar ada di kolom 1, untuk body-data-diri ada di kolom 2)
            // Kita gunakan selektor yang fleksibel: ambil <td> yang punya class 'font-bold'
            const nameCell = row.querySelector("td.font-bold");

            if (nameCell) {
              const nameText = nameCell.innerText.toLowerCase().trim();

              // Logika: Tampilkan jika nama diawali dengan input (startsWith)
              // Atau jika input masih kosong
              if (nameText.startsWith(filter) || filter === "") {
                row.style.display = "";
                row.classList.add("animate-fadeIn"); // Tambah efek biar halus
              } else {
                row.style.display = "none";
                row.classList.remove("animate-fadeIn");
              }
            }
          });
        });
      }

      function hapusSiswa(nisn) {
        Swal.fire({
          title: "Hapus Data?",
          text: "Data tidak bisa dikembalikan!",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#ef4444",
          confirmButtonText: "Ya, Hapus!",
          cancelButtonText: "Batal",
        }).then((result) => {
          if (result.isConfirmed) {
            document.querySelectorAll(`tr`).forEach((row) => {
              if (row.innerText.includes(nisn)) {
                row.classList.add("opacity-0", "scale-95");
                setTimeout(() => row.remove(), 300);
              }
            });
            Swal.fire({
              title: "Terhapus!",
              icon: "success",
              timer: 1000,
              showConfirmButton: false,
            });
          }
        });
      }

      // --- FUNGSI EDIT SISWA (Warna Biru #2563eb) ---
      async function editSiswa(nisn) {
        let rowDD = Array.from(
          document.querySelectorAll("#body-data-diri tr"),
        ).find((r) => r.innerText.includes(nisn));
        const cells = rowDD ? rowDD.querySelectorAll("td") : [];

        const { value: formValues } = await Swal.fire({
          title: "Edit Data Siswa",
          html: `<div class="text-left space-y-3 px-1">
            <div class="flex flex-col items-start"><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Nama Lengkap</label><input id="swal-nama" class="swal2-input !m-0 w-full !text-left" value="${cells[1]?.innerText.trim() || ""}"></div>
            <div class="flex flex-col items-start"><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Nama Wali</label><input id="swal-wali" class="swal2-input !m-0 w-full !text-left" value="${cells[2]?.innerText.trim() || ""}"></div>
            <div class="flex flex-col items-start"><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">No. Wali</label><input id="swal-telp" class="swal2-input !m-0 w-full !text-left" value="${cells[3]?.innerText.trim() || ""}"></div>
            <div class="flex flex-col items-start"><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Alamat</label><textarea id="swal-alamat" class="swal2-textarea !m-0 w-full !text-left">${cells[4]?.innerText.trim() || ""}</textarea></div>
          </div>`,
          showCancelButton: true,
          confirmButtonText: "Simpan Perubahan", // Text lebih formal
          confirmButtonColor: "#2563eb", // Biru SIAKAD
          cancelButtonText: "Batal",
          customClass: {
            popup: "rounded-[2rem]",
            confirmButton: "rounded-xl px-6 py-2 font-bold",
            cancelButton: "rounded-xl px-6 py-2",
          },
          preConfirm: () => ({
            nama: document.getElementById("swal-nama").value,
            wali: document.getElementById("swal-wali").value,
            telp: document.getElementById("swal-telp").value,
            alamat: document.getElementById("swal-alamat").value,
          }),
        });

        if (formValues) {
          // Logika update UI tetap sama
          document.querySelectorAll(`tr`).forEach((r) => {
            if (r.innerText.includes(nisn)) {
              const c = r.querySelectorAll("td");
              if (r.parentElement.id === "body-daftar")
                c[0].innerText = formValues.nama.toUpperCase();
              if (r.parentElement.id === "body-data-diri") {
                c[1].innerText = formValues.nama.toUpperCase();
                c[2].innerText = formValues.wali.toUpperCase();
                c[3].innerText = formValues.telp;
                c[4].innerText = formValues.alamat;
              }
            }
          });

          // Notifikasi Berhasil (Langsung Pop-up)
          Swal.fire({
            icon: "success",
            title: "Berhasil Diperbarui",
            text: "Data siswa telah disimpan ke sistem.",
            showConfirmButton: false,
            timer: 1500,
            customClass: { popup: "rounded-[2rem]" },
          });
        }
      }

      // --- FUNGSI TAMBAH SISWA (Warna Hijau #059669) ---
      async function tambahSiswa() {
        const { value: v } = await Swal.fire({
          title: "Tambah Siswa Baru",
          html: `
      <div class="text-left px-1 pb-4">
        <div class="mb-4">
          <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1 tracking-wider">Nama Lengkap</label>
          <input id="n" class="swal2-input !m-0 w-full !text-sm !h-11 border-slate-200 focus:border-emerald-500" placeholder="Masukkan nama lengkap siswa">
        </div>
        <div class="mb-4">
          <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1 tracking-wider">NISN</label>
          <input id="ni" class="swal2-input !m-0 w-full !text-sm !h-11 border-slate-200" placeholder="Masukkan 10 digit NISN">
        </div>
        <div class="flex gap-4 mb-4">
          <div class="flex-1">
            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1 tracking-wider">Nama Wali</label>
            <input id="w" class="swal2-input !m-0 w-full !text-sm !h-11 border-slate-200" placeholder="Nama ayah/ibu">
          </div>
          <div class="flex-1">
            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1 tracking-wider">No. Wali</label>
            <input id="t" class="swal2-input !m-0 w-full !text-sm !h-11 border-slate-200" placeholder="08xxxxxx">
          </div>
        </div>
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1 tracking-wider">Alamat</label>
          <textarea id="a" class="swal2-textarea !m-0 w-full !text-sm border-slate-200" placeholder="Alamat lengkap rumah..."></textarea>
        </div>
      </div>`,
          showCancelButton: true,
          confirmButtonText: "Tambahkan Siswa",
          confirmButtonColor: "#059669", // Hijau Emerald
          cancelButtonText: "Batal",
          customClass: {
            popup: "rounded-[2rem]",
            confirmButton: "rounded-xl px-6 py-2 font-bold",
            cancelButton: "rounded-xl px-6 py-2",
          },
          preConfirm: () => {
            const nama = document.getElementById("n").value;
            const nisn = document.getElementById("ni").value;
            if (!nama || !nisn) {
              Swal.showValidationMessage("Nama dan NISN wajib diisi!");
              return false;
            }
            return {
              nama,
              nisn,
              wali: document.getElementById("w").value || "-",
              telp: document.getElementById("t").value || "-",
              alamat: document.getElementById("a").value || "-",
            };
          },
        });

        if (v) {
          // Logika Insert HTML tetap sama
          const rowD = `<tr class="hover:bg-slate-50/80 transition animate-fadeIn"><td class="px-6 py-5 font-bold text-slate-700 uppercase tracking-tight">${v.nama.toUpperCase()}</td><td class="px-6 py-5 font-mono text-slate-400">${v.nisn}</td><td class="px-6 py-5"><span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-lg text-[10px] font-black uppercase">Aktif</span></td><td class="px-6 py-5 text-center"><button onclick="editSiswa('${v.nisn}')" class="text-blue-500 mx-2 hover:scale-110 transition"><i class="fas fa-edit"></i></button><button onclick="hapusSiswa('${v.nisn}')" class="text-red-500 mx-2 hover:scale-110 transition"><i class="fas fa-trash"></i></button></td></tr>`;
          const rowDD = `<tr class="bg-white border border-slate-100 shadow-sm rounded-2xl hover:shadow-md transition-all animate-fadeIn"><td class="px-6 py-5 font-mono text-slate-400 rounded-l-2xl">${v.nisn}</td><td class="px-6 py-5 font-bold text-slate-700 uppercase tracking-tight">${v.nama.toUpperCase()}</td><td class="px-6 py-5 text-slate-600 font-medium">${v.wali.toUpperCase()}</td><td class="px-6 py-5 font-mono text-slate-500">${v.telp}</td><td class="px-6 py-5 text-slate-400 italic text-sm">${v.alamat}</td><td class="px-6 py-5 text-center rounded-r-2xl"><button onclick="editSiswa('${v.nisn}')" class="text-blue-500 mx-2"><i class="fas fa-edit"></i></button><button onclick="hapusSiswa('${v.nisn}')" class="text-red-500 mx-2"><i class="fas fa-trash"></i></button></td></tr>`;

          document
            .getElementById("body-daftar")
            .insertAdjacentHTML("beforeend", rowD);
          document
            .getElementById("body-data-diri")
            .insertAdjacentHTML("beforeend", rowDD);

          Swal.fire({
            icon: "success",
            title: "Berhasil Ditambahkan",
            text: "Siswa baru telah terdaftar di database.",
            showConfirmButton: false,
            timer: 1500,
            customClass: { popup: "rounded-[2rem]" },
          });
        }
      }
      window.onload = () => {
        setupSearch("search-daftar", "body-daftar");
        setupSearch("search-data-diri", "body-data-diri");
      };
    </script>
  </body>
</html>

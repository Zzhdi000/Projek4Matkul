<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guru Dashboard - SDN GANTING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --accent-blue: #63a4ff;
        --p-rose: #a5b4fc;
        --p-yellow: #e6b85c;
        --p-green: #86efac;
        --bg-body: #fdfdfb;
        --bg-sidebar: #ffffff;
        --text-main: #2d2d2d;
        --card-bg: #ffffff;
        --border: rgba(0, 0, 0, 0.1);
        --p-red: #c9494c;
        --p-rose: #ff9178;
        --p-yellow: #f7ea7f;
        --p-orange: #f25a2d;
        --p-green: #82c697;
        --p-blue: #057711;

        --bg-body: #fdfdfb;
        --bg-sidebar: #ffffff;
        --text-main: #2d2d2d;
        --accent: var(--accent-blue);
        --card-bg: #ffffff;
        --border: rgba(0, 0, 0, 0.1);
        --dropdown-bg: #ffffff;
      }

      .nav-link:hover {
        background: rgba(0, 0, 0, 0.05);
        color: var(--accent);
      }
      .nav-link.active {
        background-color: var(--accent);
        color: white !important;
        box-shadow: 0 8px 20px -6px var(--accent);
      }

      body {
        background-color: var(--bg-body);
        color: var(--text-main);
        transition: all 0.4s ease;
        font-family: "Inter", sans-serif;
        margin: 0;
        padding: 20px;
      }

      .glass-card {
        background-color: var(--card-bg);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: 24px;
      }

      /* Navigasi Sidebar */
      .nav-link {
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-radius: 14px;
        font-size: 13px;
        color: #555;
        font-weight: 700;
      }

      .nav-link.active {
        background-color: var(--accent-blue);
        color: white !important;
        box-shadow: 0 8px 20px -6px var(--accent-blue);
      }

      .group-label {
        font-size: 10px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--accent-blue);
        margin: 25px 0 10px 16px;
      }

      /* Card Gradients */
      .grad-red {
        background: linear-gradient(135deg, #60a5fa, #a5b4fc);
      }
      .grad-orange {
        background: linear-gradient(135deg, #a78bfa, #c4b5fd);
      }
      .grad-green {
        background: linear-gradient(135deg, #e6b85c, #f2d184);
      }

      .btn-logout {
        color: #ef4444 !important;
        border: 1.5px solid transparent;
      }
      .btn-logout:hover {
        background-color: #fef2f2 !important;
        border-color: #fee2e2;
      }

      /* Sidebar Prominent Styling */
      aside {
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 0 1px rgba(0, 0, 0, 0.1) !important;
        border: 1px solid rgba(0, 0, 0, 0.08);
      }

      .dark-mode aside {
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 1px rgba(255, 255, 255, 0.1) !important;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .dropdown-solid {
        background-color: var(--dropdown-bg);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      }

      #profileDropdown {
        backdrop-filter: blur(20px);
        transform-origin: top right;
      }

      .show-dropdown {
        display: block !important;
        animation: profilePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      @keyframes profilePop {
        from { opacity: 0; transform: scale(0.9) translateY(-10px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .animate-fadeIn {
        animation: fadeIn 0.3s ease-out forwards;
      }

      .swal2-popup {
        border-radius: 2rem !important;
        padding: 2rem !important;
      }
      .swal2-title {
        font-weight: 800 !important;
        color: #1e293b !important;
      }
      .swal2-input,
      .swal2-textarea {
        border-radius: 1rem !important;
        font-size: 0.9rem !important;
        background: #f8fafc !important;
        border: 1px solid #e2e8f0 !important;
        padding: 0 1rem !important;
      }
    </style>
  </head>
  <body class="font-sans antialiased min-h-screen p-5">
    <div class="flex p-5 gap-5 min-h-screen">
      <aside
        class="w-72 flex flex-col justify-between bg-[var(--bg-sidebar)] rounded-[30px] p-7 shadow-xl sticky top-5 h-[calc(100vh-40px)]"
      >
        <div>
          <div class="flex items-center gap-4 mb-10 px-2">
            <div class="w-11 h-11 flex items-center justify-center">
              <img
                src="asset/logogtg.png"
                alt="Logo"
                class="w-full h-full object-contain"
              />
            </div>
            <div>
              <h1 class="text-xl font-black leading-tight tracking-tight">
                SDN GANTING
              </h1>
              <p
                class="text-[9px] font-bold text-gray-400 uppercase tracking-widest"
              >
                Bagian Guru
              </p>
            </div>
          </div>

          <nav>
            <p class="group-label">Navigasi Utama</p>
            <a href="guru-dashboard.html" class="nav-link active"
              ><i class="fas fa-th-large w-5"></i> Beranda</a
            >

            <p class="group-label">Manajemen</p>
            <a href="guru-presensi.html" class="nav-link"
              ><i class="fas fa-user-check w-5"></i> Presensi Siswa</a
            >
            <a href="guru-nilai.html" class="nav-link"
              ><i class="fas fa-file-invoice w-5"></i> Nilai Siswa</a
            >
            <a href="guru-jadwal.html" class="nav-link"
              ><i class="fas fa-clipboard-list w-5"></i> Jadwal Mengajar</a
            >
          </nav>
        </div>

        <div class="pt-6 border-t border-[var(--border)] relative z-[999]">
          <button
            type="button"
            onclick="handleLogout()"
            class="w-full flex items-center gap-3 py-3 px-4 btn-logout font-black rounded-xl transition-all cursor-pointer bg-transparent"
          >
            <i class="fas fa-sign-out-alt w-5"></i>
            <span>Keluar Sistem</span>
          </button>
        </div>
      </aside>


      <div class="flex-1 space-y-6">
        <header
          class="flex justify-between items-center glass-card px-8 py-5 sticky top-0 z-50"
        >
          <div>
            <h2 class="text-2xl font-black uppercase">Beranda Guru</h2>
            <p
              class="text-xs font-bold opacity-50 uppercase tracking-widest"
              id="headerSub"
            >
              SDN GANTING - Sistem Informasi Sekolah
            </p>
          </div>

          <div class="flex items-center gap-5">
            <div class="relative">
              <button id="profileTrigger" class="flex items-center gap-3 p-1.5 pr-5 bg-gray-100 dark:bg-white/10 rounded-full border border-[var(--border)] hover:bg-gray-200 dark:hover:bg-white/20 transition-all cursor-pointer">
                <div class="w-10 h-10 rounded-full bg-blue-400 flex items-center justify-center text-white font-bold text-sm" id="profileInitial">GU</div>
                <span class="text-sm font-black italic" id="profileName">Guru</span>
                <i class="fas fa-chevron-down text-[10px] opacity-50"></i>
              </button>

              <div id="profileDropdown" class="absolute right-0 mt-4 w-72 bg-[var(--card-bg)] rounded-[30px] shadow-2xl border border-[var(--border)] overflow-hidden hidden animate-fadeIn z-[999]">
                <div class="p-8 flex flex-col items-center text-center">
                  <div class="w-24 h-24 bg-blue-400 rounded-3xl flex items-center justify-center text-white text-4xl font-black shadow-lg mb-6" id="profileAvatarDropdown">GU</div>
                  
                  <h3 class="text-xl font-black text-[var(--text-main)]" id="profileNameDropdown">Guru Pengampu</h3>
                  <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-6" id="profileRoleDropdown">Guru Kelas</p>
                  
                  <hr class="w-full border-[var(--border)] mb-6">

                  <div class="w-full bg-gray-50 dark:bg-white/5 rounded-2xl p-4 flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black opacity-40 uppercase">Status</span>
                    <span class="text-[11px] font-black">Aktif</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </header>

        
          <div
            class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden"
          >
            <div class="flex border-b border-slate-100 bg-slate-50/50">
              <button
                id="tab-daftar"
                onclick="switchTab('daftar')"
                class="px-8 py-4 text-sm font-bold border-b-2 border-blue-600 text-blue-600 bg-white transition-all"
              >
                Daftar Siswa
              </button>
              <button
                id="tab-data-diri"
                onclick="switchTab('data-diri')"
                class="px-8 py-4 text-sm font-bold text-slate-400 hover:text-slate-600 transition-all"
              >
                Data Diri Siswa
              </button>
            </div>

            <div class="p-8">
              <div id="content-daftar" class="block animate-fadeIn">
                <div class="flex justify-between items-center mb-8">
                  <div class="relative w-72">
                    <i
                      class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"
                    ></i>
                    <input
                      id="search-daftar"
                      type="text"
                      placeholder="Cari nama atau NISN..."
                      class="pl-11 pr-4 py-3 bg-slate-100 border-none rounded-2xl text-sm w-full outline-none focus:ring-2 focus:ring-blue-500 transition shadow-inner"
                    />
                  </div>
                </div>
                <div class="overflow-x-auto">
                  <table class="w-full text-left">
                    <thead
                      class="text-slate-400 text-[10px] uppercase font-black tracking-[0.15em] border-b border-slate-100"
                    >
                      <tr>
                        <th class="px-6 py-4">Nama Siswa</th>
                        <th class="px-6 py-4">NISN</th>
                        <th class="px-6 py-4">Status</th>
                        <th class="px-6 py-4 text-center">Aksi</th>
                      </tr>
                    </thead>
                    <tbody id="body-daftar"></tbody>
                  </table>
                </div>
              </div>

              <div id="content-data-diri" class="hidden animate-fadeIn">
                <div
                  class="flex justify-between items-center mb-8 flex-wrap gap-4"
                >
                  <div class="relative w-72">
                    <i
                      class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"
                    ></i>
                    <input
                      id="search-data-diri"
                      type="text"
                      placeholder="Cari NISN atau Nama..."
                      class="pl-11 pr-4 py-3 bg-slate-100 border-none rounded-2xl text-sm w-full outline-none focus:ring-2 focus:ring-blue-500 transition shadow-inner"
                    />
                  </div>
                </div>
                <div class="overflow-x-auto">
                  <table
                    class="w-full text-left border-separate border-spacing-y-3"
                  >
                    <thead
                      class="text-slate-400 text-[10px] uppercase font-black tracking-[0.15em]"
                    >
                      <tr>
                        <th class="px-6 py-2">NISN</th>
                        <th class="px-6 py-2">Nama Siswa</th>
                        <th class="px-6 py-2">Nama Wali</th>
                        <th class="px-6 py-2">No. Wali</th>
                        <th class="px-6 py-2">Alamat</th>
                        <th class="px-6 py-2 text-center">Aksi</th>
                      </tr>
                    </thead>
                    <tbody id="body-data-diri"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script src="guru-profile.js">
    </script>
    <script src="guru-dashboard.js"></script>

    
  </body>
</html>

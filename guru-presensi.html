<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presensi Siswa - SIAKAD PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body class="bg-slate-50 font-sans">
    <div class="flex min-h-screen">
      <aside class="w-64 bg-[#0f172a] text-white flex-shrink-0 hidden md:flex flex-col h-screen sticky top-0">
  
  <div class="p-6 border-b border-slate-800 flex items-center space-x-3">
    <i class="fas fa-user-shield text-2xl text-blue-400"></i>
    <span class="text-xl font-bold tracking-tight">GURU PANEL</span>
  </div>

  <nav class="flex-1 mt-6 px-4 space-y-2 overflow-y-auto custom-scrollbar">
    <a href="guru-dashboard.html" class="flex items-center py-3 px-4 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition">
      <i class="fas fa-database mr-3"></i> Beranda
    </a>
    <a href="guru-presensi.html" class="flex items-center py-3 px-4 bg-[#2563eb] text-white rounded-xl transition shadow-lg shadow-blue-900/20">
      <i class="fas fa-user-check mr-3"></i> Presensi Siswa
    </a>
    <a href="guru-nilai.html"   class="flex items-center py-3 px-4 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition">
      <i class="fas fa-file-invoice mr-3"></i> Input Nilai
    </a>
    </nav>

  <div class="p-6 border-t border-slate-800 bg-[#0f172a]">
    <a href="login.html#login" class="flex items-center text-red-400 hover:text-red-300 font-bold transition">
      <i class="fas fa-sign-out-alt mr-3"></i> Logout
    </a>
  </div>

</aside>

      <div class="flex-1 flex flex-col">
        <header
          class="bg-white shadow-sm py-4 px-8 flex justify-between items-center"
        >
          <h2 class="text-xl font-bold text-slate-800">
            Presensi & Rekapitulasi
          </h2>
          <div class="flex items-center space-x-3">
            <span
              class="text-[10px] font-bold bg-blue-100 text-blue-700 px-3 py-1 rounded-full uppercase"
              >Guru Pengampu</span
            >
            <div
              class="w-10 h-10 rounded-full bg-[#0091d5] flex items-center justify-center text-white font-bold text-sm"
            >
              ED
            </div>
          </div>
        </header>

        <main class="p-8">
          <div
            class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden"
          >
            <div class="flex border-b border-slate-100 bg-slate-50/50">
              <button
                id="tab-daftar"
                onclick="switchTab('daftar')"
                class="px-8 py-4 text-sm font-bold border-b-2 border-blue-600 text-blue-600 bg-white transition-all"
              >
                Daftar Siswa
              </button>
              <button
                id="tab-rekap"
                onclick="switchTab('rekap')"
                class="px-8 py-4 text-sm font-bold text-slate-400 hover:text-slate-600 transition-all"
              >
                Rekapitulasi Presensi
              </button>
            </div>

            <div class="p-6">
              <div id="content-daftar">
                <div class="flex justify-between items-center mb-6">
                  <div class="relative w-64">
                    <i
                      class="fas fa-search absolute left-4 top-3 text-slate-400 text-sm"
                    ></i>
                    <input
                      id="search-input"
                      type="text"
                      placeholder="Cari siswa..."
                      class="pl-10 pr-4 py-2 bg-slate-100 border-none rounded-xl text-sm w-full outline-none focus:ring-2 focus:ring-blue-500 transition"
                    />
                  </div>

                  <div
                    class="flex items-center space-x-2 bg-slate-100 px-4 py-2 rounded-xl border border-slate-200 focus-within:ring-2 focus-within:ring-blue-500 transition-all"
                  >
                    <i class="far fa-calendar-alt text-blue-600 text-sm"></i>
                    <input
                      type="date"
                      value="2026-03-26"
                      class="bg-transparent border-none text-xs font-bold text-slate-600 outline-none cursor-pointer"
                    />
                  </div>
                </div>

                <div class="overflow-x-auto">
                  <table
                    class="w-full text-left border-separate border-spacing-y-2"
                  >
                    <thead
                      class="text-slate-400 text-[10px] uppercase font-bold tracking-widest"
                    >
                      <tr>
                        <th class="px-6 py-2 w-16 text-center">No</th>
                        <th class="px-6 py-2">Nama Siswa / NISN</th>
                        <th class="px-6 py-2 text-right pr-14">
                          Pilih Kehadiran Harian
                        </th>
                      </tr>
                    </thead>
                    <tbody class="text-sm">
                      </tbody>
                  </table>
                </div>

                <div class="mt-8 flex justify-end">
                  <button
                    onclick="handleSave()"
                    class="bg-[#2563eb] text-white px-8 py-3 rounded-xl text-sm font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all flex items-center"
                  >
                    <i class="fas fa-save mr-2"></i> SIMPAN PRESENSI
                  </button>
                </div>
              </div>

              <div id="content-rekap" class="hidden">
                <div class="flex justify-between items-center mb-6">
                  <h3
                    class="text-lg font-bold text-slate-700 underline decoration-blue-500 decoration-4 underline-offset-8"
                  >
                    Total Akumulasi Kehadiran
                  </h3>
                  <button
                    class="bg-emerald-600 text-white px-5 py-2 rounded-xl text-[11px] font-bold hover:bg-emerald-700 transition uppercase flex items-center shadow-lg shadow-emerald-100"
                  >
                    <i class="fas fa-file-excel mr-2"></i> Export Excel
                  </button>
                </div>
                <div class="overflow-x-auto">
                  <table
                    class="w-full text-left border-separate border-spacing-y-2"
                  >
                    <thead
                      class="bg-slate-50 text-slate-400 text-[10px] uppercase font-bold tracking-widest"
                    >
                      <tr>
                        <th class="px-6 py-4 rounded-l-xl">ID</th>
                        <th class="px-6 py-4">Nama Siswa</th>
                        <th
                          class="px-4 py-4 text-center bg-emerald-50 text-emerald-600"
                        >
                          Hadir
                        </th>
                        <th
                          class="px-4 py-4 text-center bg-amber-50 text-amber-600"
                        >
                          Izin
                        </th>
                        <th
                          class="px-4 py-4 text-center bg-blue-50 text-blue-600"
                        >
                          Sakit
                        </th>
                        <th
                          class="px-4 py-4 text-center bg-red-50 text-red-600 font-black text-xs"
                        >
                          Alfa
                        </th>
                        <th class="px-6 py-4 text-center bg-slate-100">
                          Total
                        </th>
                        <th
                          class="px-6 py-4 text-center rounded-r-xl bg-slate-100"
                        >
                          Aksi
                        </th>
                      </tr>
                    </thead>
                    <tbody class="text-sm">
                      </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="firebase-config.js"></script>
    <script src="presensi.js"></script>
  </body>
</html>
